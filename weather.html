    // === v7.1 Lumina Calculatrice — full four-op expression parser ===
    // Internal storage uses ASCII ops: + - * /  (display shows − × ÷).
    let _keypadExpr = '';
    const _OP_PRECEDENCE = { '+': 1, '-': 1, '*': 2, '/': 2 };

    // Shunting-yard + RPN evaluator. No eval(), no Function(). Tokeniser rejects
    // any char outside [digit, dot, + - * /, whitespace].
    function safeEval(expr) {
        if (!expr) return 0;
        if (!/^[\d+\-*/.\s]*$/.test(expr)) return NaN;
        // Strip trailing operator / dot so partial expressions still compute
        const cleaned = expr.replace(/[+\-*/.]+$/, '');
        if (!cleaned) return 0;

        // Tokenise. Unary +/- (at start or right after an operator) glue to the
        // next number instead of being pushed as binary operators.
        const tokens = [];
        let i = 0;
        while (i < cleaned.length) {
            const c = cleaned[i];
            if (c === ' ') { i++; continue; }
            const isUnary = (c === '-' || c === '+') &&
                (tokens.length === 0 || tokens[tokens.length - 1].t === 'op');
            if (isUnary) {
                let num = c; i++;
                while (i < cleaned.length && /[\d.]/.test(cleaned[i])) { num += cleaned[i]; i++; }
                if (num === '-' || num === '+') return NaN;
                if ((num.match(/\./g) || []).length > 1) return NaN;
                const n = parseFloat(num);
                if (isNaN(n)) return NaN;
                tokens.push({ t: 'num', v: n });
            } else if (c === '+' || c === '-' || c === '*' || c === '/') {
                tokens.push({ t: 'op', v: c });
                i++;
            } else if (/[\d.]/.test(c)) {
                let num = '';
                while (i < cleaned.length && /[\d.]/.test(cleaned[i])) { num += cleaned[i]; i++; }
                if ((num.match(/\./g) || []).length > 1) return NaN;
                const n = parseFloat(num);
                if (isNaN(n)) return NaN;
                tokens.push({ t: 'num', v: n });
            } else {
                return NaN;
            }
        }
        if (tokens.length === 0) return 0;

        // Shunting-yard → RPN
        const output = [];
        const stack = [];
        for (const tok of tokens) {
            if (tok.t === 'num') {
                output.push(tok);
            } else {
                while (stack.length && _OP_PRECEDENCE[stack[stack.length - 1].v] >= _OP_PRECEDENCE[tok.v]) {
                    output.push(stack.pop());
                }
                stack.push(tok);
            }
        }
        while (stack.length) output.push(stack.pop());

        // Evaluate RPN
        const es = [];
        for (const tok of output) {
            if (tok.t === 'num') {
                es.push(tok.v);
            } else {
                if (es.length < 2) return NaN;
                const b = es.pop(), a = es.pop();
                if      (tok.v === '+') es.push(a + b);
                else if (tok.v === '-') es.push(a - b);
                else if (tok.v === '*') es.push(a * b);
                else if (tok.v === '/') { if (b === 0) return NaN; es.push(a / b); }
            }
        }
        return es.length === 1 ? es[0] : NaN;
    }

    function openKeypad() {
        haptic();
        _keypadExpr = (S.amount && S.amount > 0) ? String(S.amount) : '';
        updateKeypadDisplay();
        document.getElementById('calc-keypad').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeKeypad() {
        haptic();
        document.getElementById('calc-keypad').classList.remove('show');
        document.body.style.overflow = '';
    }

    // Pretty-print the working expression (ASCII → math glyphs)
    function formatKeypadExpr(e) {
        return (e || '').replace(/\*/g, ' × ').replace(/\//g, ' ÷ ').replace(/-/g, ' − ').replace(/\+/g, ' + ');
    }

    function updateKeypadDisplay() {
        const el = document.getElementById('keypad-expr');
        if (!el) return;
        el.textContent = _keypadExpr ? formatKeypadExpr(_keypadExpr) : '0';
    }

    // Helper: last numeric term (segment after the last operator) for validating . placement
    function _lastTerm(expr) {
        const m = expr.match(/[\d.]*$/);
        return m ? m[0] : '';
    }

    function updateKeypad(char) {
        haptic();
        const OPS = ['+', '-', '*', '/'];
        if (char === 'clear') {
            _keypadExpr = '';
        } else if (char === 'back') {
            _keypadExpr = _keypadExpr.slice(0, -1);
        } else if (OPS.includes(char)) {
            if (!_keypadExpr) {
                // Only `-` is legal as a leading sign for a first negative number
                if (char === '-') _keypadExpr += '-';
                return;
            }
            const last = _keypadExpr.slice(-1);
            if (last === '.') return;
            if (OPS.includes(last)) {
                // Replace the trailing operator with the new one
                _keypadExpr = _keypadExpr.slice(0, -1) + char;
            } else {
                _keypadExpr += char;
            }
        } else if (char === '.') {
            const lt = _lastTerm(_keypadExpr);
            if (!lt) { _keypadExpr += '0.'; updateKeypadDisplay(); return; }
            if (lt.includes('.')) return;
            _keypadExpr += '.';
        } else {
            // digit
            if (_keypadExpr.length >= 24) return;
            const lt = _lastTerm(_keypadExpr);
            if (lt === '0' && char !== '0' && char !== '.') {
                _keypadExpr = _keypadExpr.slice(0, -1) + char;
            } else {
                _keypadExpr += char;
            }
        }
        updateKeypadDisplay();
        const result = safeEval(_keypadExpr);
        if (!isNaN(result) && isFinite(result)) {
            S.amount = result < 0 ? 0 : result;
            // hero base + target (respects VAT toggle, also reconciles state)
            applyHeroAmountValues();
            refreshVatRadar();
            const panel = document.getElementById('routing-panel');
            if (panel) { panel.innerHTML = renderRoutes(); tickRoutes(); }
            const pppSlot = document.getElementById('ppp-slot');
            if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
            const pppProg = document.getElementById('ppp-progress-slot');
            if (pppProg) pppProg.innerHTML = renderPPPProgressBar();
            if (S.zenMode) renderZenOverlay();
        }
    }

    // === v6.4 Infinite Anchor Engine ===
    // Search any item in any currency. LLM returns {emoji, label, price, currency}
    // cached directly into fx_anchors. Local GLOBAL_PPP_DB still seeds suggestion chips.
    const LLM_SEARCH_ENDPOINT = '/api/search';
    const LOCAL_CATS = ['food', 'grocery', 'tech', 'shopping'];

    function openDiscovery() {
        haptic();
        const d = t();
        document.getElementById('discovery-title').textContent = d.pppDiscoveryTitle;
        document.getElementById('discovery-disclaimer').textContent = d.pppDisclaimer;
        const input = document.getElementById('search-input');
        input.value = '';
        input.placeholder = d.searchPlaceholder;
        document.getElementById('search-submit').textContent = d.searchSubmit;
        document.getElementById('search-status').textContent = '';
        document.getElementById('search-status').className = '';
        renderSuggestions();
        document.getElementById('ppp-discovery').classList.add('show');
        document.body.style.overflow = 'hidden';
        setTimeout(() => input.focus(), 120);
    }

    function closeDiscovery() {
        haptic();
        document.getElementById('ppp-discovery').classList.remove('show');
        document.body.style.overflow = '';
    }

    function renderSuggestions() {
        const d = t();
        const data = GLOBAL_PPP_DB[S.base];
        const labelEl = document.getElementById('suggestions-label');
        const listEl = document.getElementById('suggestions-list');
        if (!data) {
            labelEl.textContent = '';
            listEl.innerHTML = '';
            return;
        }
        labelEl.textContent = d.suggestionsLabel.replace('{city}', data.city);
        // Flatten: pick 1 item per category for a compact popular strip
        const picks = [];
        LOCAL_CATS.forEach(cat => {
            const items = data[cat] || [];
            if (items.length > 0) picks.push({ cat, item: items[0] });
        });
        listEl.innerHTML = picks.map(p => `
            <button class="suggestion-chip" onclick="addSuggestedAnchor('${p.cat}', 0)">
                <span class="suggestion-emoji">${p.item.emoji}</span>
                <span class="suggestion-label">${escapeHtml(p.item.label)}</span>
                <span class="suggestion-price">${p.item.price} ${S.base}</span>
            </button>
        `).join('');
    }

    function addSuggestedAnchor(cat, idx) {
        haptic();
        const data = GLOBAL_PPP_DB[S.base];
        const item = data && data[cat] ? data[cat][idx] : null;
        if (!item) return;
        const d = t();
        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) {
            const status = document.getElementById('search-status');
            status.textContent = d.maxAnchors;
            status.className = 'error';
            return;
        }
        arr.push({
            emoji: item.emoji,
            label: `${item.label} (${data.city})`,
            price: item.price,
            currency: S.base
        });
        setAnchors(arr);
        const pppSlot = document.getElementById('ppp-slot');
        if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
        if (arr.length >= MAX_ANCHORS) { closeDiscovery(); return; }
        if (S.activeTab === 'backpack') renderContent();
        renderSuggestions();
    }

    // v7.2 Mistral compound search — endpoint returns { items: [3 entries] }.
    // We render all 3 as result cards; user clicks the +Add on the one(s) they want.
    let _searchResults = [];

    async function searchAnchor() {
        haptic();
        const d = t();
        const input    = document.getElementById('search-input');
        const status   = document.getElementById('search-status');
        const submit   = document.getElementById('search-submit');
        const resultEl = document.getElementById('search-results');
        const query = (input.value || '').trim();
        if (!query) return;

        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) {
            status.textContent = d.maxAnchors;
            status.className = 'error';
            return;
        }

        submit.disabled = true;
        status.textContent = d.searching;
        status.className = '';
        if (resultEl) resultEl.innerHTML = '';
        _searchResults = [];

        try {
            const res = await fetch(LLM_SEARCH_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, currency: S.base })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const payload = await res.json();
            // Expected: { items: [ { emoji, label, price, currency } x3 ] }
            const items = Array.isArray(payload?.items) ? payload.items : [];
            const valid = items.filter(it =>
                it && typeof it.price === 'number' && it.label && it.currency
            );
            if (valid.length === 0) throw new Error('No valid items in response');
            _searchResults = valid.slice(0, 3);
            renderSearchResults();
            status.textContent = '';
            input.value = '';
        } catch (err) {
            console.warn('[searchAnchor] failed:', err);
            status.textContent = d.searchError;
            status.className = 'error';
        } finally {
            submit.disabled = false;
        }
    }

    function renderSearchResults() {
        const resultEl = document.getElementById('search-results');
        if (!resultEl) return;
        if (_searchResults.length === 0) { resultEl.innerHTML = ''; return; }
        resultEl.innerHTML = _searchResults.map((it, i) => `
            <button class="result-card" onclick="addResultAnchor(${i})">
                <span class="result-emoji">${it.emoji || '🏷️'}</span>
                <span class="result-label">${escapeHtml(it.label)}</span>
                <span class="result-price">${Number(it.price).toLocaleString()} ${it.currency}</span>
                <span class="result-add">＋</span>
            </button>
        `).join('');
    }

    function addResultAnchor(idx) {
        haptic();
        const it = _searchResults[idx];
        if (!it) return;
        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) {
            const status = document.getElementById('search-status');
            if (status) {
                const d = t();
                status.textContent = d.maxAnchors;
                status.className = 'error';
            }
            return;
        }
        arr.push({
            emoji: it.emoji || '🏷️',
            label: it.label,
            price: it.price,
            currency: it.currency
        });
        setAnchors(arr);
        // Remove the just-added card from the visible list
        _searchResults.splice(idx, 1);
        renderSearchResults();
        const pppSlot = document.getElementById('ppp-slot');
        if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
        if (S.activeTab === 'backpack' || S.activeTab === 'weather') renderContent();
        if (arr.length >= MAX_ANCHORS) closeDiscovery();
    }

    // === AA Splitter ===
    function calcSplit(bill, n, payer) {
        if (!S.cr || !bill || bill <= 0 || n <= 0) return null;
        const r = getWalletRates();
        let actualPaid;
        if (payer === 'zero')      actualPaid = bill * S.cr * (1 + r.zero);
        else if (payer === 'card') actualPaid = bill * S.cr * (1 + r.card);
        else                       actualPaid = bill * S.cr * (1 + r.card) + r.atm * S.cr;
        const perShare = actualPaid / n;
        const surchargePerHead = (actualPaid - bill * S.cr) / n;
        return { actualPaid, perShare, surchargePerHead };
    }
    function openSplitModal() {
        haptic();
        const routes = calcRouting(S.amount);
        S.splitPayer = routes ? routes[0].id : 'zero';
        S.splitPeople = 2;
        S.splitOpen = true;
        _prevSplit = 0; // Reset tick origin on each fresh open (ephemeral)
        const d = t();
        document.getElementById('split-title').textContent = d.splitHeader;
        renderSplitBody();
        document.getElementById('split-modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    function closeSplitModal() {
        S.splitOpen = false;
        _prevSplit = 0;
        document.getElementById('split-modal').classList.remove('show');
        document.body.style.overflow = '';
    }
    function incrementPeople(delta) {
        haptic();
        const next = S.splitPeople + delta;
        if (next < 2 || next > 10) return;
        S.splitPeople = next;
        renderSplitBody();
    }
    function setSplitPayer(method) {
        haptic();
        S.splitPayer = method;
        renderSplitBody();
    }
    function renderSplitBody() {
        const d = t();
        const body = document.getElementById('split-body');
        if (!body) return;
        if (!S.cr || !S.amount || S.amount <= 0) {
            body.innerHTML = `<div class="split-empty">${d.splitNoBill}</div>`;
            return;
        }
        const split = calcSplit(S.amount, S.splitPeople, S.splitPayer);
        const actualStr = Number(split.actualPaid.toFixed(2)).toLocaleString();
        const shareStr = Number(split.perShare.toFixed(2)).toLocaleString();
        const surchargeStr = Number(split.surchargePerHead.toFixed(2)).toLocaleString();
        const actualCopy = d.splitActualPaid.replace('{x}', actualStr).replace('{TARGET}', S.target);
        const surchargeCopy = d.splitSurchargeHint.replace('{x}', surchargeStr).replace('{TARGET}', S.target);
        const startStr = `${Number((_prevSplit || 0).toFixed(2)).toLocaleString()} ${S.target}`;
        body.innerHTML = `
            <div class="split-bill">
                <span class="split-label">${d.splitBillLabel}</span>
                <span class="split-bill-amt">${Number(S.amount).toLocaleString()} ${S.base}</span>
            </div>
            <div class="split-row">
                <span class="split-label">${d.splitPeopleLabel}</span>
                <div class="split-stepper">
                    <button class="split-step-btn" onclick="incrementPeople(-1)" ${S.splitPeople <= 2 ? 'disabled' : ''}>−</button>
                    <span class="split-step-val">${S.splitPeople}</span>
                    <button class="split-step-btn" onclick="incrementPeople(1)" ${S.splitPeople >= 10 ? 'disabled' : ''}>+</button>
                </div>
            </div>
            <div class="split-row-col">
                <span class="split-label">${d.splitPayerLabel}</span>
                <div class="split-seg">
                    <button class="split-seg-btn${S.splitPayer==='zero'?' active':''}" onclick="setSplitPayer('zero')">${d.splitPayerZero}</button>
                    <button class="split-seg-btn${S.splitPayer==='card'?' active':''}" onclick="setSplitPayer('card')">${d.splitPayerCard}</button>
                    <button class="split-seg-btn${S.splitPayer==='atm' ?' active':''}" onclick="setSplitPayer('atm')">${d.splitPayerAtm}</button>
                </div>
            </div>
            <div class="split-result">
                <div class="split-actual">${actualCopy}</div>
                <div class="split-per-share">${d.splitPerShare}<strong data-target="${split.perShare}">${startStr}</strong></div>
                ${split.surchargePerHead > 0.01 ? `<div class="split-hint">${surchargeCopy}</div>` : ''}
            </div>
        `;
        // Tick the per-share number smoothly
        const shareEl = body.querySelector('.split-per-share strong[data-target]');
        if (shareEl) {
            const target = split.perShare;
            const from = _prevSplit || 0;
            const targetCode = S.target;
            tickNumber(shareEl, from, target, 350, (v) => `${Number(v.toFixed(2)).toLocaleString()} ${targetCode}`);
            _prevSplit = target;
        }
    }

    // === Guide tab ===
    // [推论] Tag map indexed by guideCards position — now only the 3 universal
    // iron rules. Country-specific tips were retired in v7.3 in favor of the
    // /api/intel live feed; the tag-sort no-ops for the iron rules but the
    // structure is kept so future iron-rule additions can declare context.
    const GUIDE_TAGS = [
        ['card', 'fee', 'dcc'],     // 0 — DCC Vampire
        ['atm', 'fee'],              // 1 — ATM Monster
        ['weekend', 'card', 'fx']    // 2 — Weekend Markup
    ];

    function vGuide() {
        const d = t();
        const interp = (s) => s.replace(/\{BASE\}/g, S.base).replace(/\{TARGET\}/g, S.target);

        // Iron rules — fixed order, three universal traps
        const ironCards = d.guideCards.map((c, idx) => {
            const cardKey = `iron:${idx}`;
            const open = S.openCard === cardKey;
            return `
                <div class="flashcard${open ? ' open' : ''}" style="--stagger:${idx + 1}" onclick="toggleCard('${cardKey}')">
                    <div class="flashcard-header">
                        <div class="flashcard-title">
                            <span class="flashcard-emoji">${c.emoji}</span>
                            <span class="flashcard-label">${interp(c.title)}</span>
                        </div>
                        <span class="flashcard-chevron">▼</span>
                    </div>
                    <div class="flashcard-body">${interp(c.body)}</div>
                </div>
            `;
        }).join('');

        return `
            <div class="bottom-sheet full">
                <div class="sheet-handle"></div>
                <section class="tab-header">
                    <h1 class="tab-title">${d.guideTitle}</h1>
                    <p class="tab-subtitle">${d.guideSubtitle}</p>
                </section>
                <section class="tab-body">
                    <div class="guide-section-label">${d.ironRulesLabel}</div>
                    ${ironCards}
                    <div class="guide-section-label intel-section">${d.localIntelLabel}${S.geoCountry ? ` · ${S.geoCountry}` : ''}</div>
                    <div id="intel-slot">${renderGuideIntelSlot()}</div>
                </section>
            </div>
        `;
    }

    function renderGuideIntelSlot() {
        const d = t();
        if (S.intelLoading) {
            return `<div class="intel-loading">${d.intelLoadingLabel}</div>`;
        }
        if (S.intelError && S.intelCards.length === 0) {
            return `<div class="intel-error">${d.intelErrorLabel}</div>`;
        }
        if (S.intelCards.length === 0) {
            // Initial state before fetch starts (e.g. /api/intel unreachable in local dev)
            return '';
        }
        const cards = S.intelCards.map((it, idx) => {
            const cardKey = `intel:${idx}`;
            const open = S.openCard === cardKey;
            return `
                <div class="flashcard intel-card${open ? ' open' : ''}" style="--stagger:${idx + 1}" onclick="toggleCard('${cardKey}')">
                    <div class="flashcard-header">
                        <div class="flashcard-title">
                            <span class="flashcard-emoji">${it.emoji || '📍'}</span>
                            <span class="flashcard-label">${escapeHtml(it.title)}</span>
                        </div>
                        <span class="flashcard-chevron">▼</span>
                    </div>
                    <div class="flashcard-body">${escapeHtml(it.body)}</div>
                </div>
            `;
        }).join('');
        return `${cards}<div class="intel-disclaimer">${d.intelDisclaimer}</div>`;
    }
    function toggleCard(key) {
        haptic();
        S.openCard = (S.openCard === key) ? null : key;
        renderContent();
    }

    // === Backpack tab ===
    function vBackpack() {
        const d = t();
        const hapticOn = localStorage.getItem('fx_haptic') !== 'off';
        const r = getWalletRates();
        const anchors = getAnchors();

        const anchorRows = anchors.map((a, idx) => `
            <div class="setting-card anchor-row">
                <div class="anchor-row-line">
                    <input class="anchor-emoji-in" type="text" maxlength="4"
                        value="${escapeAttr(a.emoji)}" placeholder="${d.anchorEmojiPh}"
                        onchange="updateAnchor(${idx}, 'emoji', this.value)">
                    <input class="anchor-label-in" type="text" maxlength="28"
                        value="${escapeAttr(a.label)}" placeholder="${d.anchorLabelPh}"
                        onchange="updateAnchor(${idx}, 'label', this.value)">
                    <input class="anchor-price-in" type="number" step="0.01" min="0"
                        value="${a.price || ''}" placeholder="0"
                        onchange="updateAnchor(${idx}, 'price', this.value)">
                    <button class="anchor-currency-btn" onclick="openCurrencyModal('anchor:${idx}')">${a.currency || S.target}</button>
                    <button class="anchor-delete-btn" onclick="removeAnchor(${idx})" aria-label="delete">✕</button>
                </div>
            </div>
        `).join('');

        const atMax = anchors.length >= MAX_ANCHORS;

        return `
            <div class="bottom-sheet full">
                <div class="sheet-handle"></div>
                <section class="tab-header">
                    <h1 class="tab-title">${d.backpackTitle}</h1>
                    <p class="tab-subtitle">${d.backpackSubtitle}</p>
                </section>
                <section class="tab-body">
                    <div class="setting-card toggle-row" onclick="toggleHaptic()">
                        <span class="setting-label">${d.hapticLabel}</span>
                        <span class="setting-val">${hapticOn ? d.on : d.off}</span>
                    </div>

                    <div class="wallet-section-title">${d.walletRatesTitle}</div>

                    <div class="setting-card">
                        <div class="setting-row-top">
                            <span class="setting-label">${d.rateZeroLabel}<button class="info-icon-btn" onclick="event.stopPropagation(); showRateInfo('zero')" aria-label="info">ⓘ</button></span>
                            <div>
                                <input class="setting-input" type="number" step="0.01" min="0" value="${(r.zero * 100).toFixed(2)}"
                                    oninput="setWalletRate('fx_rate_zero', parseFloat(this.value) / 100)">
                                <span class="setting-unit">%</span>
                            </div>
                        </div>
                        <div class="setting-origin">${d.rateZeroOrigin}</div>
                    </div>

                    <div class="setting-card">
                        <div class="setting-row-top">
                            <span class="setting-label">${d.rateCardLabel}<button class="info-icon-btn" onclick="event.stopPropagation(); showRateInfo('card')" aria-label="info">ⓘ</button></span>
                            <div>
                                <input class="setting-input" type="number" step="0.01" min="0" value="${(r.card * 100).toFixed(2)}"
                                    oninput="setWalletRate('fx_rate_card', parseFloat(this.value) / 100)">
                                <span class="setting-unit">%</span>
                            </div>
                        </div>
                        <div class="setting-origin">${d.rateCardOrigin}</div>
                    </div>

                    <div class="setting-card">
                        <div class="setting-row-top">
                            <span class="setting-label">${d.feeAtmLabel}<button class="info-icon-btn" onclick="event.stopPropagation(); showRateInfo('atm')" aria-label="info">ⓘ</button></span>
                            <div>
                                <input class="setting-input" type="number" step="0.5" min="0" value="${r.atm}"
                                    oninput="setWalletRate('fx_fee_atm', parseFloat(this.value))">
                                <span class="setting-unit">${S.base}</span>
                            </div>
                        </div>
                        <div class="setting-origin">${d.feeAtmOrigin}</div>
                    </div>

                    <div class="wallet-section-title">${d.anchorsTitle}</div>
                    <div class="wallet-section-hint">${d.anchorsHint}</div>
                    ${anchorRows}

                    <div class="setting-card toggle-row danger" onclick="haptic(); localStorage.clear(); location.reload()">
                        <span class="setting-label">${d.clearLabel}</span>
                        <span class="setting-val">⚠</span>
                    </div>

                    <div class="footer">
                        ${d.slogan}
                    </div>
                </section>
            </div>
        `;
    }

    function renderDock() {
        document.getElementById('dock').innerHTML = t().dock.map(td => `
            <button class="dock-btn${S.activeTab===td.id?' active':''}" onclick="haptic(); S.activeTab='${td.id}'; S.openCard=null; renderContent();">
                ${ICONS[td.icon]}
                <span class="dock-lbl">${td.lbl}</span>
            </button>
        `).join('');
    }

    async function init() {
        applyI18n();
        renderLangSwitch();
        seedAnchorsIfEmpty();
        await fetchR();
        renderContent();
    }

    init();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
</script>
