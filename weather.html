<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>FX Weather</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF5A5F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F5F5F7;
            --accent: #FF5A5F;
            --text: #000000;
            --text2: #86868B;
            --line: #E5E5E7;
            --green: #2EB67D;
            --red: #D93025;
            --amber: #E8A33D;
            --safe-b: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "PingFang SC", sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased; line-height: 1.4;
            overflow-x: hidden;
        }

        .layout { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
        #content { flex: 1; padding-bottom: calc(88px + var(--safe-b)); }

        /* === Editorial site header === */
        .site-header {
            padding: 22px 24px 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 13px; font-weight: 800; letter-spacing: 2.5px;
            text-transform: uppercase; color: var(--text);
        }
        .lang-switch {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; letter-spacing: 1px;
        }
        .lang-option {
            color: var(--text2); padding: 4px 2px; cursor: pointer;
            transition: color 0.15s;
        }
        .lang-option.active { color: var(--text); font-weight: 900; }
        .lang-sep { color: var(--text2); opacity: 0.4; }

        /* === Weather hero (coral) === */
        .hero {
            background: var(--accent); color: #FFFFFF;
            padding: 24px 24px 48px;
            margin: 12px 0 0;
            border-bottom-right-radius: 40px;
        }
        .pair-selector {
            display: flex; align-items: center; gap: 14px;
            font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
            margin-bottom: 30px;
        }
        .pair-sep { opacity: 0.55; font-weight: 500; }
        .picker-unit {
            cursor: pointer;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.5);
            padding-bottom: 3px;
            transition: border-color 0.15s;
        }
        .picker-unit:active { border-bottom-color: rgba(255, 255, 255, 0.95); }

        .amount-wrap { display: flex; flex-direction: column; gap: 6px; }
        .hero-amount-label {
            font-size: 11px; font-weight: 800; letter-spacing: 1.8px;
            color: rgba(255, 255, 255, 0.8); text-transform: uppercase;
        }
        .hero-amount-input {
            background: none; border: none; color: #FFFFFF;
            font-size: clamp(64px, 18vw, 96px); font-weight: 700;
            letter-spacing: -0.04em; line-height: 1;
            outline: none; width: 100%; padding: 0;
            font-family: inherit; caret-color: rgba(255, 255, 255, 0.9);
        }
        .weather-label {
            font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.85); margin-top: 10px;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* === PPP bar (white, tucks under hero) === */
        .ppp-bar {
            background: var(--bg);
            padding: 22px 24px 14px;
            margin-top: -28px;
            border-top-left-radius: 40px;
            display: flex; flex-direction: column; gap: 6px;
            min-height: 18px;
        }
        .ppp-line {
            font-size: 13px; font-weight: 600; color: var(--text2);
            letter-spacing: 0.2px;
        }
        .ppp-line strong { color: var(--text); font-weight: 800; }

        /* === Routes section (gray block) === */
        .routes-section {
            background: var(--surface);
            padding: 20px 20px 30px;
            min-height: 40vh;
        }
        .section-label {
            font-size: 11px; font-weight: 800; color: var(--text2);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 18px 4px 12px;
        }

        .dcc-shield {
            background: #FFFFFF;
            border: 1px solid var(--line);
            border-left: 3px solid var(--accent);
            border-radius: 14px;
            padding: 14px 16px; margin-bottom: 14px;
            font-size: 12px; font-weight: 600; line-height: 1.55;
            color: var(--text);
        }
        .dcc-shield-icon { margin-right: 6px; font-weight: 900; }

        .first-run-banner {
            background: #FFFFFF;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 14px 12px 16px;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            font-size: 12px; font-weight: 600; color: var(--text);
            margin-bottom: 14px; cursor: pointer;
        }
        .banner-text { flex: 1; line-height: 1.4; }
        .banner-close {
            background: none; border: none; color: var(--text2);
            font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
            font-family: inherit;
        }

        .route-card {
            background: #FFFFFF;
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .route-card.best { border: 2px solid var(--text); padding: 17px 19px; }
        .route-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .route-method {
            font-size: 12px; font-weight: 800; letter-spacing: 1px;
            color: var(--text2); text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
        }
        .route-icon {
            width: 16px; height: 16px;
            stroke: var(--text2); stroke-width: 1.6; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .best-pill {
            background: var(--accent); color: #FFFFFF;
            font-size: 9px; font-weight: 900; letter-spacing: 0.9px;
            padding: 4px 8px; border-radius: 6px; text-transform: uppercase;
        }
        .route-cost-line {
            display: flex; justify-content: space-between; align-items: baseline;
            gap: 8px;
        }
        .route-cost {
            font-size: 28px; font-weight: 700; color: var(--text);
            letter-spacing: -0.02em;
            max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            line-height: 1.1;
        }
        .route-code { font-size: 13px; font-weight: 800; color: var(--text2); }
        .route-hint {
            font-size: 11px; font-weight: 600; color: var(--text2);
            margin-top: 4px; line-height: 1.4;
        }
        .route-delta {
            font-size: 11px; font-weight: 700; color: var(--red);
            margin-top: 4px; letter-spacing: 0.3px;
        }

        /* === ATM slider === */
        .atm-expand-btn {
            background: none; border: none; color: var(--text);
            font-weight: 800; font-size: 10px; cursor: pointer;
            font-family: inherit; padding: 10px 0 4px;
            letter-spacing: 1.2px; text-transform: uppercase;
            align-self: flex-start; border-bottom: 1px solid var(--text);
            margin-top: 4px;
        }
        .atm-expand-btn:active { opacity: 0.6; }
        .atm-slider-panel {
            max-height: 0; overflow: hidden;
            transition: max-height 0.28s ease, padding-top 0.28s ease;
            padding-top: 0;
        }
        .atm-slider-panel.open { max-height: 260px; padding-top: 16px; }
        .atm-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 6px; border-radius: 3px;
            background: linear-gradient(90deg, var(--red), var(--amber), var(--green));
            outline: none; margin: 0;
        }
        .atm-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px; border-radius: 50%;
            background: #FFFFFF; border: 2px solid var(--text);
            cursor: pointer; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .atm-slider::-moz-range-thumb {
            width: 20px; height: 20px; border-radius: 50%;
            background: #FFFFFF; border: 2px solid var(--text); cursor: pointer;
        }
        .atm-readout {
            display: flex; flex-wrap: wrap; align-items: baseline;
            gap: 6px; margin-top: 14px;
            font-size: 13px; font-weight: 700; color: var(--text);
        }
        .atm-readout strong { font-weight: 900; }
        .atm-arrow { opacity: 0.4; }
        .atm-slider-hint {
            font-size: 10px; color: var(--text2);
            margin-top: 10px; font-weight: 600; line-height: 1.4;
        }
        .atm-edit-link {
            color: var(--text); cursor: pointer; font-weight: 700;
            text-decoration: underline;
        }

        /* === Split trigger (coral CTA) === */
        .split-trigger-btn {
            background: var(--accent); border: none; color: #FFFFFF;
            font-weight: 800; font-size: 12px; cursor: pointer;
            font-family: inherit; padding: 14px 24px;
            border-radius: 999px; width: 100%;
            letter-spacing: 1px; text-transform: uppercase;
            margin-top: 16px;
        }
        .split-trigger-btn:active { opacity: 0.85; }

        /* === Time Machine === */
        .time-machine {
            background: #FFFFFF;
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 18px 20px;
            margin-top: 14px;
        }
        .time-machine-tag {
            font-size: 11px; font-weight: 800; color: var(--text2);
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
        }
        .time-machine-text {
            font-size: 14px; font-weight: 600; line-height: 1.55; color: var(--text);
        }
        .time-machine-text .delta-save { color: var(--green); font-weight: 900; }
        .time-machine-text .delta-cost { color: var(--red); font-weight: 900; }

        /* === Guide / Backpack tab header === */
        .tab-header { padding: 28px 24px 18px; }
        .tab-title {
            font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
            color: var(--text); line-height: 1.1;
        }
        .tab-subtitle {
            font-size: 14px; font-weight: 500; color: var(--text2);
            margin-top: 6px; letter-spacing: 0.1px;
        }
        .tab-body { padding: 0 20px; }

        /* === Flashcards === */
        .flashcard {
            background: #FFFFFF;
            border: 1px solid var(--line);
            border-radius: 20px;
            margin-bottom: 10px; overflow: hidden; cursor: pointer;
            transition: all 0.3s ease;
        }
        .flashcard-header {
            padding: 18px 22px;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
        }
        .flashcard-title { display: flex; align-items: center; gap: 12px; flex: 1; }
        .flashcard-emoji { font-size: 24px; flex-shrink: 0; }
        .flashcard-label {
            font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3;
        }
        .flashcard-chevron {
            font-size: 11px; color: var(--text2); transition: transform 0.25s ease;
        }
        .flashcard.open .flashcard-chevron { transform: rotate(180deg); }
        .flashcard-body {
            max-height: 0; overflow: hidden;
            padding: 0 22px; transition: all 0.3s ease;
            font-size: 13px; font-weight: 500; line-height: 1.6; color: var(--text);
        }
        .flashcard.open .flashcard-body { max-height: 300px; padding: 0 22px 20px 56px; }

        /* === Backpack settings === */
        .setting-card {
            background: #FFFFFF;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px 20px; margin-bottom: 8px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .setting-card.toggle-row {
            flex-direction: row; justify-content: space-between; align-items: center;
            cursor: pointer; padding: 16px 20px;
        }
        .setting-label { font-size: 14px; font-weight: 700; color: var(--text); }
        .setting-val {
            font-size: 13px; font-weight: 800; color: var(--text2);
            letter-spacing: 0.3px;
        }
        .setting-row-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .setting-input {
            background: none; border: none; color: var(--text);
            font-size: 16px; font-weight: 800; text-align: right;
            width: 70px; outline: none; font-family: inherit;
            border-bottom: 1px solid var(--line); padding: 2px 0;
        }
        .setting-input:focus { border-bottom-color: var(--accent); }
        .setting-unit { font-size: 13px; font-weight: 800; color: var(--text2); margin-left: 4px; }
        .setting-origin {
            font-size: 10px; font-weight: 500; color: var(--text2); line-height: 1.4;
        }
        .setting-card.danger { border-color: var(--red); margin-top: 16px; }
        .setting-card.danger .setting-label { color: var(--red); }

        .wallet-section-title {
            font-size: 11px; font-weight: 800; color: var(--text2);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 24px 4px 10px;
        }
        .wallet-section-hint {
            font-size: 11px; font-weight: 500; color: var(--text2);
            margin: -4px 4px 10px; line-height: 1.4;
        }

        /* === Anchor rows === */
        .anchor-row { padding: 10px 14px; }
        .anchor-row-line {
            display: grid;
            grid-template-columns: 32px 1fr 68px 50px 22px;
            gap: 6px; align-items: center;
        }
        .anchor-emoji-in, .anchor-label-in, .anchor-price-in {
            background: none; border: none; color: var(--text);
            font-weight: 600; font-size: 13px; outline: none; font-family: inherit;
            border-bottom: 1px solid var(--line); padding: 4px 2px;
        }
        .anchor-emoji-in { font-size: 16px; text-align: center; }
        .anchor-label-in { width: 100%; }
        .anchor-price-in { text-align: right; font-weight: 800; }
        .anchor-emoji-in:focus, .anchor-label-in:focus, .anchor-price-in:focus {
            border-bottom-color: var(--accent);
        }
        .anchor-currency-btn {
            background: var(--surface); border: none; border-radius: 8px;
            color: var(--text); font-weight: 800; font-size: 11px;
            cursor: pointer; padding: 6px 4px; font-family: inherit;
            letter-spacing: 0.3px;
        }
        .anchor-delete-btn {
            background: none; border: none; color: var(--text2);
            font-size: 15px; cursor: pointer; padding: 2px; line-height: 1;
            font-family: inherit;
        }
        .anchor-add-btn {
            background: transparent;
            border: 1px dashed var(--line);
            border-radius: 12px; padding: 12px; width: 100%;
            color: var(--text); font-weight: 700; font-size: 12px;
            cursor: pointer; font-family: inherit; margin-top: 4px;
            letter-spacing: 0.3px;
        }
        .anchor-add-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .anchor-add-btn:active:not(:disabled) { opacity: 0.7; }

        .footer {
            padding: 40px 0 20px; text-align: center;
            color: var(--text); font-size: 12px; line-height: 1.7;
            letter-spacing: 0.3px; opacity: 0.75;
        }
        .footer-version {
            display: block; margin-top: 6px; font-weight: 700;
            letter-spacing: 2px; opacity: 0.6; font-size: 10px;
        }

        /* === Dock === */
        .dock {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px;
            height: calc(64px + var(--safe-b));
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--line);
            display: flex; justify-content: space-around;
            padding: 4px 0 var(--safe-b); z-index: 9999;
        }
        .dock-btn {
            flex: 1; border: none; background: none;
            color: var(--text2);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px;
            cursor: pointer; min-height: 44px; padding: 6px;
            font-family: inherit;
            transition: color 0.2s ease;
        }
        .dock-btn.active { color: var(--text); }
        .dock-icon {
            width: 22px; height: 22px;
            stroke: currentColor; stroke-width: 1.6;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
        }
        .dock-lbl {
            font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* === Modals === */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
            z-index: 10000; display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            width: 100%; max-width: 500px; margin: 0 auto;
            background: #FFFFFF;
            border-radius: 28px 28px 0 0;
            padding: 24px 20px calc(24px + var(--safe-b));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.1);
        }
        .modal-overlay.show .modal-sheet { transform: translateY(0); }
        .modal-header {
            font-size: 11px; font-weight: 800; text-align: center;
            margin-bottom: 18px; color: var(--text2);
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .modal-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            max-height: 50vh; overflow-y: auto; padding-bottom: 4px;
        }
        .modal-item {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px; border-radius: 14px;
            background: var(--surface);
            font-size: 15px; font-weight: 800; cursor: pointer; color: var(--text);
            border: 1px solid transparent;
            transition: background 0.15s, transform 0.12s;
            font-family: inherit;
        }
        .modal-item:active { transform: scale(0.97); }
        .modal-item.active { background: var(--text); color: #FFFFFF; }
        .modal-flag { font-size: 18px; }

        /* === Split modal === */
        .split-sheet { padding-bottom: calc(30px + var(--safe-b)); }
        .split-bill {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 18px; padding-bottom: 14px;
            border-bottom: 1px solid var(--line);
        }
        .split-bill-amt { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
        .split-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .split-row-col { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
        .split-label {
            font-size: 11px; font-weight: 800; letter-spacing: 1px;
            color: var(--text2); text-transform: uppercase;
        }
        .split-stepper { display: flex; align-items: center; gap: 14px; }
        .split-step-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--surface); color: var(--text);
            font-size: 17px; font-weight: 700; cursor: pointer;
            font-family: inherit; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .split-step-btn:active:not(:disabled) { transform: scale(0.92); }
        .split-step-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .split-step-val { min-width: 30px; text-align: center; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
        .split-seg { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .split-seg-btn {
            padding: 10px 4px; border-radius: 10px;
            border: 1px solid var(--line); background: var(--surface);
            color: var(--text); cursor: pointer;
            font-size: 11px; font-weight: 700; font-family: inherit;
            letter-spacing: 0.2px; line-height: 1.3;
            transition: background 0.15s;
        }
        .split-seg-btn.active { background: var(--text); color: #FFFFFF; border-color: var(--text); }
        .split-result {
            margin-top: 18px; padding: 18px;
            background: var(--surface); border-radius: 16px;
        }
        .split-actual { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
        .split-per-share { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }
        .split-per-share strong {
            font-size: 28px; font-weight: 700; color: var(--text);
            letter-spacing: -0.02em; display: block; margin-top: 2px;
        }
        .split-hint { font-size: 10px; color: var(--text2); font-weight: 500; margin-top: 6px; }
        .split-empty {
            padding: 30px 10px; text-align: center;
            color: var(--text2); font-size: 13px; font-weight: 500; line-height: 1.5;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="layout">
    <header class="site-header">
        <div class="logo" id="logo">FX Weather</div>
        <div class="lang-switch" id="lang-switch"></div>
    </header>

    <main id="content"></main>

    <nav class="dock" id="dock"></nav>
</div>

<div id="currency-modal" class="modal-overlay" onclick="closeCurrencyModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-header" id="modal-title"></div>
        <div class="modal-list" id="modal-list"></div>
    </div>
</div>

<div id="split-modal" class="modal-overlay" onclick="closeSplitModal()">
    <div class="modal-sheet split-sheet" onclick="event.stopPropagation()">
        <div class="modal-header" id="split-title"></div>
        <div id="split-body"></div>
    </div>
</div>

<script>
    const CURS = ["EUR","USD","GBP","JPY","AUD","CAD","CHF","CNY","SGD","HKD"];
    const FLAGS = {
        EUR: '🇪🇺', USD: '🇺🇸', GBP: '🇬🇧', JPY: '🇯🇵', AUD: '🇦🇺',
        CAD: '🇨🇦', CHF: '🇨🇭', CNY: '🇨🇳', SGD: '🇸🇬', HKD: '🇭🇰'
    };

    const ICONS = {
        compass: '<svg class="dock-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>',

        if (nav.startsWith('zh')) return 'zh';

    function t() { return I18N[S.lang]; }
    function haptic() {
        if (navigator.vibrate && localStorage.getItem('fx_haptic') !== 'off') navigator.vibrate(10);
    }
    function escapeAttr(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // === Wallet rates ===
    function getWalletRates() {
        return {
            zero: parseFloat(localStorage.getItem('fx_rate_zero')) || 0.0035,
            card: parseFloat(localStorage.getItem('fx_rate_card')) || 0.015,
            atm:  parseFloat(localStorage.getItem('fx_fee_atm'))  || 3.0
        };
    }
    function setWalletRate(key, value) {
        if (isNaN(value)) return;
        localStorage.setItem(key, String(value));
        localStorage.setItem('fx_banner_dismissed', 'true');
    }

    // === Anchors ===
    function getAnchors() {
        try {
            const raw = localStorage.getItem('fx_anchors');
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
        } catch (e) { return []; }
    }
    function setAnchors(arr) { localStorage.setItem('fx_anchors', JSON.stringify(arr)); }
    function updateAnchor(idx, field, value) {
        const arr = getAnchors();
        if (!arr[idx]) return;
        if (field === 'price') value = parseFloat(value) || 0;
        arr[idx][field] = value;
        setAnchors(arr);
    }
    function addAnchor() {
        haptic();
        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) return;
        arr.push({ emoji: '', label: '', price: 0, currency: S.target });
        setAnchors(arr);
        renderContent();
    }
    function removeAnchor(idx) {
        haptic();
        const arr = getAnchors();
        arr.splice(idx, 1);
        setAnchors(arr);
        renderContent();
    }
    function calcAnchors(billInBase) {
        if (!billInBase || !S.cr) return [];
        return getAnchors()
            .filter(a => a.price > 0 && a.label && (a.currency === S.base || a.currency === S.target))
            .map(a => {
                const count = (a.currency === S.base)
                    ? billInBase / a.price
                    : (billInBase * S.cr) / a.price;
                return { ...a, count };
            });
    }

    // === v5.0: Seed anchors from PPP_DB on first launch ===
    function seedAnchorsIfEmpty() {
        if (localStorage.getItem('fx_anchors_seeded') === 'true') return;
        if (getAnchors().length > 0) {
            localStorage.setItem('fx_anchors_seeded', 'true');
            return;
        }
        const baseData = PPP_DB[S.base];
        const targetData = PPP_DB[S.target];
        const seeded = [];
        if (baseData) {
            seeded.push({ emoji: '🍔', label: `Big Mac (${baseData.city})`, price: baseData.bigMac, currency: S.base });
            seeded.push({ emoji: '☕', label: `Coffee (${baseData.city})`, price: baseData.coffee, currency: S.base });
        }
        if (targetData && S.target !== S.base) {
            seeded.push({ emoji: '🍔', label: `Big Mac (${targetData.city})`, price: targetData.bigMac, currency: S.target });
        }
        if (seeded.length) setAnchors(seeded);
        localStorage.setItem('fx_anchors_seeded', 'true');
    }

    function dismissBanner(goBackpack) {
        haptic();
        localStorage.setItem('fx_banner_dismissed', 'true');
        if (goBackpack) S.activeTab = 'backpack';
        renderContent();
    }

    // === Currency picker modal ===
    let currentPickerType = 'base';

    function openCurrencyModal(type) {
        haptic();
        currentPickerType = type;
        const d = t();
        let title, active;
        if (type === 'base') { title = d.pickerTitleBase; active = S.base; }
        else if (type === 'target') { title = d.pickerTitleTarget; active = S.target; }
        else if (type.startsWith('anchor:')) {
            title = d.pickerTitleAnchor;
            const idx = parseInt(type.split(':')[1], 10);
            const a = getAnchors()[idx];
            active = a ? a.currency : S.target;
        }
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-list').innerHTML = CURS.map(c => `
            <button class="modal-item${active === c ? ' active' : ''}" onclick="selectCurrency('${c}')">
                <span class="modal-flag">${FLAGS[c] || '🏳️'}</span>
                <span>${c}</span>
            </button>
        `).join('');
        document.getElementById('currency-modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeCurrencyModal() {
        document.getElementById('currency-modal').classList.remove('show');
        document.body.style.overflow = '';
    }

    async function selectCurrency(curr) {
        haptic();
        closeCurrencyModal();
        if (currentPickerType === 'base' && S.base !== curr) {
            S.base = curr;
            renderContent();
            await fetchR();
            renderContent();
        } else if (currentPickerType === 'target' && S.target !== curr) {
            S.target = curr;
            renderContent();
            await fetchR();
            renderContent();
        } else if (currentPickerType.startsWith('anchor:')) {
            const idx = parseInt(currentPickerType.split(':')[1], 10);
            const arr = getAnchors();
            if (arr[idx] && arr[idx].currency !== curr) {
                arr[idx].currency = curr;
                setAnchors(arr);
                renderContent();
            }
        }
    }

    // === Language (3-state inline switcher) ===
    function setLang(lang) {
        if (!LANGS.includes(lang) || S.lang === lang) return;
        haptic();
        S.lang = lang;
        localStorage.setItem('fx_lang', S.lang);
        applyI18n();
        renderLangSwitch();
        renderContent();
    }

    function renderLangSwitch() {
        const el = document.getElementById('lang-switch');
        if (!el) return;
        el.innerHTML = LANGS.map((lg, i) => {
            const sep = i < LANGS.length - 1 ? '<span class="lang-sep">·</span>' : '';
            return `<span class="lang-option${S.lang === lg ? ' active' : ''}" onclick="setLang('${lg}')">${lg.toUpperCase()}</span>${sep}`;
        }).join('');
    }

    function applyI18n() {
        document.documentElement.lang = S.lang === 'zh' ? 'zh-CN' : S.lang === 'fr' ? 'fr' : 'en';
        document.title = 'FX Weather';
    }

    function toggleHaptic() {
        const now = localStorage.getItem('fx_haptic') !== 'off';
        localStorage.setItem('fx_haptic', now ? 'off' : 'on');
        if (!now) haptic();
        if (S.activeTab === 'backpack') renderContent();
    }

    async function fetchR() {
        try {
            const r = await fetch(`https://api.exchangerate-api.com/v4/latest/${S.base}`);
            const d = await r.json();
            S.cr = d.rates[S.target] || 0;
            localStorage.setItem('fx_base', S.base);
            localStorage.setItem('fx_target', S.target);
        } catch(e) { console.error("Rate API error", e); S.cr = 0; }

        try {
            const today = new Date();
            const end = today.toISOString().split('T')[0];
            today.setDate(today.getDate() - 30);
            const start = today.toISOString().split('T')[0];
            const hr = await fetch(`https://api.frankfurter.dev/v1/${start}..${end}?from=${S.base}&to=${S.target}`);
            const hd = await hr.json();
            if (hd && hd.rates) {
                S.hist = Object.keys(hd.rates).sort().map(date => ({
                    date, rate: hd.rates[date][S.target]
                }));
            } else {
                S.hist = [];
            }
        } catch(e) { console.error("History API error", e); S.hist = []; }
    }

    // [产品决策] 7-day MA weather bands — thresholds ±0.3% / ±0.8% per PRD v4.1 (carried into v5.0)
    function calcWeatherBand() {
        if (!S.cr || S.hist.length < 7) return null;
        const last7 = S.hist.slice(-7);
        const ma = last7.reduce((a, b) => a + b.rate, 0) / last7.length;
        if (ma === 0) return null;
        const delta = (S.cr - ma) / ma * 100;
        if (delta >=  0.8) return { band: 'great',  delta };
        if (delta >=  0.3) return { band: 'good',   delta };
        if (delta >  -0.3) return { band: 'stable', delta };
        if (delta >  -0.8) return { band: 'poor',   delta };
        return { band: 'storm', delta };
    }

    function renderHeroWeatherLabel() {
        const w = calcWeatherBand();
        const d = t();
        if (!w) return d.weatherBand.loading;
        const sign = w.delta >= 0 ? '+' : '';
        return `${sign}${w.delta.toFixed(2)}% · ${d.weatherBand[w.band]}`;
    }

    function calcRouting(amount) {
        if (!S.cr || !amount || amount <= 0) return null;
        const r = getWalletRates();
        const methods = [
            { id: 'zero', cost: amount * S.cr * (1 + r.zero) },
            { id: 'card', cost: amount * S.cr * (1 + r.card) },
            { id: 'atm',  cost: amount * S.cr * (1 + r.card) + r.atm * S.cr }
        ];
        methods.sort((a, b) => a.cost - b.cost);
        methods.forEach((m, i) => {
            m.isBest = (i === 0);
            m.rank = i;
            m.delta = m.cost - methods[0].cost;
        });
        return methods;
    }

    function calcTimeMachine() {
        if (S.hist.length < 6 || !S.cr) return null;
        const lastWeek = S.hist[S.hist.length - 6];
        const totalDelta = 1000 * (S.cr - lastWeek.rate);
        return {
            date: lastWeek.date,
            absDelta: Math.abs(totalDelta),
            isSave: totalDelta >= 0
        };
    }

    function renderContent() {
        const c = document.getElementById('content');
        if      (S.activeTab === 'weather')  c.innerHTML = vWeather();
        else if (S.activeTab === 'guide')    c.innerHTML = vGuide();
        else if (S.activeTab === 'backpack') c.innerHTML = vBackpack();
        else c.innerHTML = '';
        renderDock();
    }

    // === Weather tab ===
    function vWeather() {
        const d = t();
        const bannerShown = localStorage.getItem('fx_banner_dismissed') !== 'true';
        const dccText = d.dccShield.replace('{BASE}', S.base).replace('{TARGET}', S.target);

        return `
            <section class="hero">
                <div class="pair-selector">
                    <span class="picker-unit" onclick="openCurrencyModal('base')">${S.base}</span>
                    <span class="pair-sep">→</span>
                    <span class="picker-unit" onclick="openCurrencyModal('target')">${S.target}</span>
                </div>
                <div class="amount-wrap">
                    <span class="hero-amount-label">${d.heroAmountLabel}</span>
                    <input type="number" id="calc-in" class="hero-amount-input" value="${S.amount}"
                        oninput="if(this.value.length>10)this.value=this.value.slice(0,10); updateRouting(this.value)"
                        inputmode="decimal">
                </div>
                <div class="weather-label">${renderHeroWeatherLabel()}</div>
            </section>

            <section class="ppp-bar" id="ppp-slot">${renderPPPContent()}</section>

            <section class="routes-section">
                <div class="dcc-shield">${dccText}</div>
                ${bannerShown ? `
                    <div class="first-run-banner" onclick="dismissBanner(true)">
                        <span class="banner-text">${d.bannerDefault}</span>
                        <button class="banner-close" onclick="event.stopPropagation(); dismissBanner(false)" aria-label="close">✕</button>
                    </div>` : ''}
                <div class="section-label">${d.routesSection}</div>
                <div id="routing-panel">${renderRoutes()}</div>
                <button class="split-trigger-btn" onclick="openSplitModal()">${d.splitTrigger}</button>
                <div id="time-machine-slot">${renderTimeMachine()}</div>
            </section>
        `;
    }

    function renderPPPContent() {
        const items = calcAnchors(S.amount);
        if (items.length === 0) return '';
        const d = t();
        return items.map(a => {
            const n = a.count >= 10 ? Math.round(a.count) : a.count.toFixed(1);
            return `<div class="ppp-line">${d.pppPrefix} <strong>${n} ${escapeHtml(a.label)}</strong></div>`;
        }).join('');
    }

    function renderRoutes() {
        const d = t();
        const routes = calcRouting(S.amount);
        if (!routes) {
            return ['zero', 'card', 'atm'].map(id => {
                const m = d.methods[id];
                return `
                    <div class="route-card">
                        <div class="route-top">
                            <span class="route-method">${ICONS[m.icon]}<span>${m.name}</span></span>
                        </div>
                        <div class="route-cost-line">
                            <div class="route-cost">—</div>
                            <div class="route-code">${S.target}</div>
                        </div>
                        <div class="route-hint">${m.hint}</div>
                    </div>
                `;
            }).join('');
        }
        return routes.map(r => {
            const atmIsWorst = (r.id === 'atm' && r.rank === 2);
            const method = atmIsWorst ? d.methodsAtmWorst : d.methods[r.id];
            const costStr = Number(r.cost.toFixed(2)).toLocaleString();
            const deltaStr = r.delta > 0
                ? d.deltaVsBest.replace('{delta}', Number(r.delta.toFixed(2)).toLocaleString()).replace('{TARGET}', S.target)
                : '';
            const atmExtra = (r.id === 'atm') ? renderAtmPanelControls() : '';
            return `
                <div class="route-card${r.isBest ? ' best' : ''}">
                    <div class="route-top">
                        <span class="route-method">${ICONS[method.icon]}<span>${method.name}</span></span>
                        ${r.isBest ? `<span class="best-pill">${d.bestPill}</span>` : ''}
                    </div>
                    <div class="route-cost-line">
                        <div class="route-cost">${costStr}</div>
                        <div class="route-code">${S.target}</div>
                    </div>
                    <div class="route-hint">${method.hint}</div>
                    ${deltaStr ? `<div class="route-delta">${deltaStr}</div>` : ''}
                    ${atmExtra}
                </div>
            `;
        }).join('');
    }

    function renderTimeMachine() {
        const tm = calcTimeMachine();
        if (!tm) return '';
        const d = t();
        const deltaStr = Number(tm.absDelta.toFixed(2)).toLocaleString();
        const template = tm.isSave ? d.timeMachineSave : d.timeMachineCost;
        const txt = template
            .replace('{BASE}', S.base)
            .replace('{TARGET}', S.target)
            .replace('{delta}', deltaStr)
            .replace('{date}', tm.date);
        return `
            <div class="time-machine">
                <div class="time-machine-tag">${d.timeMachineTag}</div>
                <div class="time-machine-text">${txt}</div>
            </div>
        `;
    }

    function updateRouting(val) {
        S.amount = parseFloat(val) || 0;
        const panel = document.getElementById('routing-panel');
        if (panel) panel.innerHTML = renderRoutes();
        const pppSlot = document.getElementById('ppp-slot');
        if (pppSlot) pppSlot.innerHTML = renderPPPContent();
    }

    // === ATM slider ===
    function calcAtmTier(lossPct) {
        const d = t();
        if (lossPct >= 5)   return { color: 'var(--red)',   label: d.atmTierExtreme };
        if (lossPct >= 1.5) return { color: 'var(--amber)', label: d.atmTierMeh };
        return                       { color: 'var(--green)', label: d.atmTierGood };
    }
    function amountToSliderVal(amount, minA, maxA) {
        if (amount <= minA) return 0;
        if (amount >= maxA) return 100;
        const tv = Math.log(amount / minA) / Math.log(maxA / minA);
        return Math.round(tv * 100);
    }
    function atmBounds() {
        const rates = getWalletRates();
        return {
            fee: rates.atm,
            minA: Math.max(2 * rates.atm, 1),
            maxA: Math.max(1000, 50 * rates.atm)
        };
    }
    function toggleAtmPanel() {
        haptic();
        const wasClosed = !S.atmOpen;
        if (wasClosed) {
            const b = atmBounds();
            S.atmSliderVal = amountToSliderVal(S.amount || b.minA, b.minA, b.maxA);
        }
        S.atmOpen = !S.atmOpen;
        const panel = document.querySelector('.atm-slider-panel');
        const btn = document.querySelector('.atm-expand-btn');
        const d = t();
        if (btn) btn.textContent = S.atmOpen ? d.atmSliderClose : d.atmSliderOpen;
        if (panel) {
            if (wasClosed && S.atmOpen) {
                const slider = panel.querySelector('.atm-slider');
                if (slider) slider.value = S.atmSliderVal;
                updateAtmSlider(S.atmSliderVal);
            }
            panel.classList.toggle('open', S.atmOpen);
        }
    }
    function updateAtmSlider(sliderVal) {
        S.atmSliderVal = parseInt(sliderVal, 10) || 0;
        const b = atmBounds();
        const tv = S.atmSliderVal / 100;
        const amt = b.minA * Math.pow(b.maxA / b.minA, tv);
        const lossPct = (b.fee / amt) * 100;
        const tier = calcAtmTier(lossPct);
        const amtEl = document.getElementById('atm-amount');
        const lossEl = document.getElementById('atm-loss');
        const tierEl = document.getElementById('atm-tier');
        if (amtEl) amtEl.textContent = `${Math.round(amt).toLocaleString()} ${S.base}`;
        if (lossEl) { lossEl.textContent = `${lossPct.toFixed(1)}%`; lossEl.style.color = tier.color; }
        if (tierEl) { tierEl.textContent = tier.label; tierEl.style.color = tier.color; }
    }
    function renderAtmPanelControls() {
        const b = atmBounds();
        if (b.fee <= 0 || !S.cr) return '';
        const d = t();
        const tv = S.atmSliderVal / 100;
        const amt = b.minA * Math.pow(b.maxA / b.minA, tv);
        const lossPct = (b.fee / amt) * 100;
        const tier = calcAtmTier(lossPct);
        const hint = d.atmSliderHint.replace('{fee}', b.fee).replace('{base}', S.base);
        return `
            <button class="atm-expand-btn" onclick="event.stopPropagation(); toggleAtmPanel();">${S.atmOpen ? d.atmSliderClose : d.atmSliderOpen}</button>
            <div class="atm-slider-panel${S.atmOpen ? ' open' : ''}">
                <input type="range" class="atm-slider" min="0" max="100" value="${S.atmSliderVal}"
                    oninput="updateAtmSlider(this.value)">
                <div class="atm-readout">
                    <span>${d.atmSliderWithdraw}</span>
                    <strong id="atm-amount">${Math.round(amt).toLocaleString()} ${S.base}</strong>
                    <span class="atm-arrow">→</span>
                    <strong id="atm-loss" style="color:${tier.color}">${lossPct.toFixed(1)}%</strong>
                    <span id="atm-tier" style="color:${tier.color}">${tier.label}</span>
                </div>
                <div class="atm-slider-hint">${hint}<a class="atm-edit-link" onclick="event.stopPropagation(); goToBackpack();">${d.atmSliderHintEdit}</a></div>
            </div>
        `;
    }
    function goToBackpack() {
        haptic();
        S.activeTab = 'backpack';
        renderContent();
    }

    // === AA Splitter ===
    function calcSplit(bill, n, payer) {
        if (!S.cr || !bill || bill <= 0 || n <= 0) return null;
        const r = getWalletRates();
        let actualPaid;
        if (payer === 'zero')      actualPaid = bill * S.cr * (1 + r.zero);
        else if (payer === 'card') actualPaid = bill * S.cr * (1 + r.card);
        else                       actualPaid = bill * S.cr * (1 + r.card) + r.atm * S.cr;
        const perShare = actualPaid / n;
        const surchargePerHead = (actualPaid - bill * S.cr) / n;
        return { actualPaid, perShare, surchargePerHead };
    }
    function openSplitModal() {
        haptic();
        const routes = calcRouting(S.amount);
        S.splitPayer = routes ? routes[0].id : 'zero';
        S.splitPeople = 2;
        S.splitOpen = true;
        const d = t();
        document.getElementById('split-title').textContent = d.splitHeader;
        renderSplitBody();
        document.getElementById('split-modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    function closeSplitModal() {
        S.splitOpen = false;
        document.getElementById('split-modal').classList.remove('show');
        document.body.style.overflow = '';
    }
    function incrementPeople(delta) {
        haptic();
        const next = S.splitPeople + delta;
        if (next < 2 || next > 10) return;
        S.splitPeople = next;
        renderSplitBody();
    }
    function setSplitPayer(method) {
        haptic();
        S.splitPayer = method;
        renderSplitBody();
    }
    function renderSplitBody() {
        const d = t();
        const body = document.getElementById('split-body');
        if (!body) return;
        if (!S.cr || !S.amount || S.amount <= 0) {
            body.innerHTML = `<div class="split-empty">${d.splitNoBill}</div>`;
            return;
        }
        const split = calcSplit(S.amount, S.splitPeople, S.splitPayer);
        const actualStr = Number(split.actualPaid.toFixed(2)).toLocaleString();
        const shareStr = Number(split.perShare.toFixed(2)).toLocaleString();
        const surchargeStr = Number(split.surchargePerHead.toFixed(2)).toLocaleString();
        const actualCopy = d.splitActualPaid.replace('{x}', actualStr).replace('{TARGET}', S.target);
        const surchargeCopy = d.splitSurchargeHint.replace('{x}', surchargeStr).replace('{TARGET}', S.target);
        body.innerHTML = `
            <div class="split-bill">
                <span class="split-label">${d.splitBillLabel}</span>
                <span class="split-bill-amt">${Number(S.amount).toLocaleString()} ${S.base}</span>
            </div>
            <div class="split-row">
                <span class="split-label">${d.splitPeopleLabel}</span>
                <div class="split-stepper">
                    <button class="split-step-btn" onclick="incrementPeople(-1)" ${S.splitPeople <= 2 ? 'disabled' : ''}>−</button>
                    <span class="split-step-val">${S.splitPeople}</span>
                    <button class="split-step-btn" onclick="incrementPeople(1)" ${S.splitPeople >= 10 ? 'disabled' : ''}>+</button>
                </div>
            </div>
            <div class="split-row-col">
                <span class="split-label">${d.splitPayerLabel}</span>
                <div class="split-seg">
                    <button class="split-seg-btn${S.splitPayer==='zero'?' active':''}" onclick="setSplitPayer('zero')">${d.splitPayerZero}</button>
                    <button class="split-seg-btn${S.splitPayer==='card'?' active':''}" onclick="setSplitPayer('card')">${d.splitPayerCard}</button>
                    <button class="split-seg-btn${S.splitPayer==='atm' ?' active':''}" onclick="setSplitPayer('atm')">${d.splitPayerAtm}</button>
                </div>
            </div>
            <div class="split-result">
                <div class="split-actual">${actualCopy}</div>
                <div class="split-per-share">${d.splitPerShare}<strong>${shareStr} ${S.target}</strong></div>
                ${split.surchargePerHead > 0.01 ? `<div class="split-hint">${surchargeCopy}</div>` : ''}
            </div>
        `;
    }

    // === Guide tab ===
    function vGuide() {
        const d = t();
        const interp = (s) => s.replace(/\{BASE\}/g, S.base).replace(/\{TARGET\}/g, S.target);
        const cards = d.guideCards.map((c, i) => {
            const open = S.openCard === i;
            return `
                <div class="flashcard${open ? ' open' : ''}" onclick="toggleCard(${i})">
                    <div class="flashcard-header">
                        <div class="flashcard-title">
                            <span class="flashcard-emoji">${c.emoji}</span>
                            <span class="flashcard-label">${interp(c.title)}</span>
                        </div>
                        <span class="flashcard-chevron">▼</span>
                    </div>
                    <div class="flashcard-body">${interp(c.body)}</div>
                </div>
            `;
        }).join('');
        return `
            <section class="tab-header">
                <h1 class="tab-title">${d.guideTitle}</h1>
                <p class="tab-subtitle">${d.guideSubtitle}</p>
            </section>
            <section class="tab-body">${cards}</section>
        `;
    }
    function toggleCard(i) {
        haptic();
        S.openCard = (S.openCard === i) ? null : i;
        renderContent();
    }

    // === Backpack tab ===
    function vBackpack() {
        const d = t();
        const hapticOn = localStorage.getItem('fx_haptic') !== 'off';
        const r = getWalletRates();
        const anchors = getAnchors();

        const anchorRows = anchors.map((a, idx) => `
            <div class="setting-card anchor-row">
                <div class="anchor-row-line">
                    <input class="anchor-emoji-in" type="text" maxlength="4"
                        value="${escapeAttr(a.emoji)}" placeholder="${d.anchorEmojiPh}"
                        onchange="updateAnchor(${idx}, 'emoji', this.value)">
                    <input class="anchor-label-in" type="text" maxlength="28"
                        value="${escapeAttr(a.label)}" placeholder="${d.anchorLabelPh}"
                        onchange="updateAnchor(${idx}, 'label', this.value)">
                    <input class="anchor-price-in" type="number" step="0.01" min="0"
                        value="${a.price || ''}" placeholder="0"
                        onchange="updateAnchor(${idx}, 'price', this.value)">
                    <button class="anchor-currency-btn" onclick="openCurrencyModal('anchor:${idx}')">${a.currency || S.target}</button>
                    <button class="anchor-delete-btn" onclick="removeAnchor(${idx})" aria-label="delete">✕</button>
                </div>
            </div>
        `).join('');

        const atMax = anchors.length >= MAX_ANCHORS;

        return `
            <section class="tab-header">
                <h1 class="tab-title">${d.backpackTitle}</h1>
                <p class="tab-subtitle">${d.backpackSubtitle}</p>
            </section>
            <section class="tab-body">
                <div class="setting-card toggle-row" onclick="toggleHaptic()">
                    <span class="setting-label">${d.hapticLabel}</span>
                    <span class="setting-val">${hapticOn ? d.on : d.off}</span>
                </div>

                <div class="wallet-section-title">${d.walletRatesTitle}</div>

                <div class="setting-card">
                    <div class="setting-row-top">
                        <span class="setting-label">${d.rateZeroLabel}</span>
                        <div>
                            <input class="setting-input" type="number" step="0.01" min="0" value="${(r.zero * 100).toFixed(2)}"
                                oninput="setWalletRate('fx_rate_zero', parseFloat(this.value) / 100)">
                            <span class="setting-unit">%</span>
                        </div>
                    </div>
                    <div class="setting-origin">${d.rateZeroOrigin}</div>
                </div>

                <div class="setting-card">
                    <div class="setting-row-top">
                        <span class="setting-label">${d.rateCardLabel}</span>
                        <div>
                            <input class="setting-input" type="number" step="0.01" min="0" value="${(r.card * 100).toFixed(2)}"
                                oninput="setWalletRate('fx_rate_card', parseFloat(this.value) / 100)">
                            <span class="setting-unit">%</span>
                        </div>
                    </div>
                    <div class="setting-origin">${d.rateCardOrigin}</div>
                </div>

                <div class="setting-card">
                    <div class="setting-row-top">
                        <span class="setting-label">${d.feeAtmLabel}</span>
                        <div>
                            <input class="setting-input" type="number" step="0.5" min="0" value="${r.atm}"
                                oninput="setWalletRate('fx_fee_atm', parseFloat(this.value))">
                            <span class="setting-unit">${S.base}</span>
                        </div>
                    </div>
                    <div class="setting-origin">${d.feeAtmOrigin}</div>
                </div>

                <div class="wallet-section-title">${d.anchorsTitle}</div>
                <div class="wallet-section-hint">${d.anchorsHint}</div>
                ${anchorRows}
                <button class="anchor-add-btn" onclick="addAnchor()" ${atMax ? 'disabled' : ''}>${d.anchorAdd}</button>

                <div class="setting-card toggle-row danger" onclick="haptic(); localStorage.clear(); location.reload()">
                    <span class="setting-label">${d.clearLabel}</span>
                    <span class="setting-val">⚠</span>
                </div>

                <div class="footer">
                    ${d.slogan}
                    <span class="footer-version">v5.0</span>
                </div>
            </section>
        `;
    }

    function renderDock() {
        document.getElementById('dock').innerHTML = t().dock.map(td => `
            <button class="dock-btn${S.activeTab===td.id?' active':''}" onclick="haptic(); S.activeTab='${td.id}'; S.openCard=null; renderContent();">
                ${ICONS[td.icon]}
                <span class="dock-lbl">${td.lbl}</span>
            </button>
        `).join('');
    }

    async function init() {
        applyI18n();
        renderLangSwitch();
        seedAnchorsIfEmpty();
        await fetchR();
        renderContent();
    }

    init();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
</script>

</body>
</html>
