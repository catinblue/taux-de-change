                <section class="routes-section">
                    <div class="dcc-shield"><span class="dcc-shield-icon">!</span>${dccText}</div>
                    ${bannerShown ? `
                        <div class="first-run-banner" onclick="dismissBanner(true)">
                            <span class="banner-text">${d.bannerDefault}</span>
                            <button class="banner-close" onclick="event.stopPropagation(); dismissBanner(false)" aria-label="close">✕</button>
                        </div>` : ''}
                    <div class="section-label">${d.routesSection}</div>
                    <div id="routing-panel">${renderRoutes()}</div>
                    <div id="time-machine-slot">${renderTimeMachine()}</div>
                </section>
            </div>
        `;
    }

    async function swapCurrencies() {
        haptic();
        const tmp = S.base;
        S.base = S.target;
        S.target = tmp;
        resetCostCaches();
        renderContent();
        await fetchR();
        renderContent();
    }

    function renderPPPContent() {
        const items = calcAnchors(S.amount);
        if (items.length === 0) return '';
        const d = t();
        return items.map((a, i) => {
            const target = a.count;
            const fromVal = _prevPPP[a._idx] != null ? _prevPPP[a._idx] : 0;
            const displayStart = target >= 10 ? Math.round(fromVal) : (Math.round(fromVal * 10) / 10);
            return `
                <div class="ppp-line" style="--stagger:${i + 1}" data-anchor-idx="${a._idx}" onclick="editPPPAnchor(${a._idx})">
                    ${d.pppPrefix} <strong><span class="ppp-count" data-target="${target}" data-idx="${a._idx}">${displayStart}</span> ${escapeHtml(a.label)}</strong>
                </div>
            `;
        }).join('');
    }

    // === v5.0.1 PPP inline editing ===
    function editPPPAnchor(idx) {
        haptic();
        const arr = getAnchors();
        const a = arr[idx];
        if (!a) return;
        const line = document.querySelector(`.ppp-line[data-anchor-idx="${idx}"]`);
        if (!line || line.classList.contains('editing')) return;
        line.classList.add('editing');
        line.onclick = null;
        line.innerHTML = `
            <input class="ppp-price-edit" type="number" step="0.01" min="0" value="${a.price}" placeholder="price" inputmode="decimal">
            <input class="ppp-label-edit" type="text" value="${escapeAttr(a.label)}" placeholder="label" maxlength="28">
            <button class="ppp-save-btn" onclick="savePPPEdit(${idx})" aria-label="save">✓</button>
        `;
        const priceEl = line.querySelector('.ppp-price-edit');
        if (priceEl) { priceEl.focus(); priceEl.select(); }
        // Save on Enter in either field
        line.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); savePPPEdit(idx); }
            });
        });
    }

    function savePPPEdit(idx) {
        const line = document.querySelector(`.ppp-line[data-anchor-idx="${idx}"]`);
        if (!line) return;
        const priceEl = line.querySelector('.ppp-price-edit');
        const labelEl = line.querySelector('.ppp-label-edit');
        if (!priceEl || !labelEl) return;
        const newPrice = parseFloat(priceEl.value);
        const newLabel = labelEl.value.trim();
        const arr = getAnchors();
        if (!arr[idx]) return;
        if (!isNaN(newPrice) && newPrice > 0) arr[idx].price = newPrice;
        if (newLabel) arr[idx].label = newLabel;
        setAnchors(arr);
        haptic();
        // Invalidate cached count for this anchor (so next tick starts from 0 → new)
        delete _prevPPP[idx];
        const pppSlot = document.getElementById('ppp-slot');
        if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
    }

    function renderRoutes() {
        const d = t();
        const routes = calcRouting(S.amount);
        if (!routes) {
            return ['zero', 'card', 'atm'].map((id, i) => {
                const m = d.methods[id];
                return `
                    <div class="route-card" style="--stagger:${i + 1}">
                        <div class="route-top">
                            <span class="route-method">${ICONS[m.icon]}<span>${m.name}</span></span>
                        </div>
                        <div class="route-cost-line">
                            <div class="route-cost">—</div>
                            <div class="route-code">${S.target}</div>
                        </div>
                        <div class="route-hint">${m.hint}</div>
                    </div>
                `;
            }).join('');
        }
        return routes.map(r => {
            const atmIsWorst = (r.id === 'atm' && r.rank === 2);
            const method = atmIsWorst ? d.methodsAtmWorst : d.methods[r.id];
            const prev = _prevCosts[r.id] || 0;
            const startStr = Number(prev.toFixed(2)).toLocaleString();
            const deltaStr = r.delta > 0
                ? d.deltaVsBest.replace('{delta}', Number(r.delta.toFixed(2)).toLocaleString()).replace('{TARGET}', S.target)
                : '';
            const atmExtra = (r.id === 'atm') ? renderAtmPanelControls() : '';
            return `
                <div class="route-card${r.isBest ? ' best' : ''}" style="--stagger:${r.rank + 1}">
                    <div class="route-top">
                        <span class="route-method">${ICONS[method.icon]}<span>${method.name}</span></span>
                        ${r.isBest ? `<span class="best-pill">${d.bestPill}</span>` : ''}
                    </div>
                    <div class="route-cost-line">
                        <div class="route-cost" data-target="${r.cost}" data-method="${r.id}">${startStr}</div>
                        <div class="route-code">${S.target}</div>
                    </div>
                    <div class="route-hint">${method.hint}</div>
                    ${deltaStr ? `<div class="route-delta">${deltaStr}</div>` : ''}
                    ${atmExtra}
                </div>
            `;
        }).join('');
    }

    function renderTimeMachine() {
        const tm = calcTimeMachine();
        if (!tm) return '';
        const d = t();
        const deltaStr = Number(tm.absDelta.toFixed(2)).toLocaleString();
        const template = tm.isSave ? d.timeMachineSave : d.timeMachineCost;
        const txt = template
            .replace('{BASE}', S.base)
            .replace('{TARGET}', S.target)
            .replace('{delta}', deltaStr)
            .replace('{date}', tm.date);
        return `
            <div class="time-machine">
                <div class="time-machine-tag">${d.timeMachineTag}</div>
                <div class="time-machine-text">${txt}</div>
            </div>
        `;
    }

    function updateRouting(val) {
        S.amount = parseFloat(val) || 0;
        const panel = document.getElementById('routing-panel');
        if (panel) { panel.innerHTML = renderRoutes(); tickRoutes(); }
        const pppSlot = document.getElementById('ppp-slot');
        if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
    }

    // === ATM slider ===
    function calcAtmTier(lossPct) {
        const d = t();
        if (lossPct >= 5)   return { color: 'var(--red)',   label: d.atmTierExtreme };
        if (lossPct >= 1.5) return { color: 'var(--amber)', label: d.atmTierMeh };
        return                       { color: 'var(--green)', label: d.atmTierGood };
    }
    function amountToSliderVal(amount, minA, maxA) {
        if (amount <= minA) return 0;
        if (amount >= maxA) return 100;
        const tv = Math.log(amount / minA) / Math.log(maxA / minA);
        return Math.round(tv * 100);
    }
    function atmBounds() {
        const rates = getWalletRates();
        return {
            fee: rates.atm,
            minA: Math.max(2 * rates.atm, 1),
            maxA: Math.max(1000, 50 * rates.atm)
        };
    }
    function toggleAtmPanel() {
        haptic();
        const wasClosed = !S.atmOpen;
        if (wasClosed) {
            const b = atmBounds();
            S.atmSliderVal = amountToSliderVal(S.amount || b.minA, b.minA, b.maxA);
        }
        S.atmOpen = !S.atmOpen;
        const panel = document.querySelector('.atm-slider-panel');
        const btn = document.querySelector('.atm-expand-btn');
        const d = t();
        if (btn) btn.textContent = S.atmOpen ? d.atmSliderClose : d.atmSliderOpen;
        if (panel) {
            if (wasClosed && S.atmOpen) {
                const slider = panel.querySelector('.atm-slider');
                if (slider) slider.value = S.atmSliderVal;
                updateAtmSlider(S.atmSliderVal);
            }
            panel.classList.toggle('open', S.atmOpen);
        }
    }
    function updateAtmSlider(sliderVal) {
        S.atmSliderVal = parseInt(sliderVal, 10) || 0;
        const b = atmBounds();
        const tv = S.atmSliderVal / 100;
        const amt = b.minA * Math.pow(b.maxA / b.minA, tv);
        const lossPct = (b.fee / amt) * 100;
        const tier = calcAtmTier(lossPct);
        const amtEl = document.getElementById('atm-amount');
        const lossEl = document.getElementById('atm-loss');
        const tierEl = document.getElementById('atm-tier');
        if (amtEl) amtEl.textContent = `${Math.round(amt).toLocaleString()} ${S.base}`;
        if (lossEl) { lossEl.textContent = `${lossPct.toFixed(1)}%`; lossEl.style.color = tier.color; }
        if (tierEl) { tierEl.textContent = tier.label; tierEl.style.color = tier.color; }
    }
    function renderAtmPanelControls() {
        const b = atmBounds();
        if (b.fee <= 0 || !S.cr) return '';
        const d = t();
        const tv = S.atmSliderVal / 100;
        const amt = b.minA * Math.pow(b.maxA / b.minA, tv);
        const lossPct = (b.fee / amt) * 100;
        const tier = calcAtmTier(lossPct);
        const hint = d.atmSliderHint.replace('{fee}', b.fee).replace('{base}', S.base);
        return `
            <button class="atm-expand-btn" onclick="event.stopPropagation(); toggleAtmPanel();">${S.atmOpen ? d.atmSliderClose : d.atmSliderOpen}</button>
            <div class="atm-slider-panel${S.atmOpen ? ' open' : ''}">
                <input type="range" class="atm-slider" min="0" max="100" value="${S.atmSliderVal}"
                    oninput="updateAtmSlider(this.value)">
                <div class="atm-readout">
                    <span>${d.atmSliderWithdraw}</span>
                    <strong id="atm-amount">${Math.round(amt).toLocaleString()} ${S.base}</strong>
                    <span class="atm-arrow">→</span>
                    <strong id="atm-loss" style="color:${tier.color}">${lossPct.toFixed(1)}%</strong>
                    <span id="atm-tier" style="color:${tier.color}">${tier.label}</span>
                </div>
                <div class="atm-slider-hint">${hint}<a class="atm-edit-link" onclick="event.stopPropagation(); goToBackpack();">${d.atmSliderHintEdit}</a></div>
            </div>
        `;
    }
    function goToBackpack() {
        haptic();
        S.activeTab = 'backpack';
        renderContent();
    }

    // === v6.3 Lumina Calculatrice (custom numeric keypad) ===
    let _keypadExpr = '';

    function safeEval(expr) {
        if (!expr) return 0;
        if (!/^[\d+.]*$/.test(expr)) return NaN;
        const clean = expr.replace(/[+.]+$/, '');
        if (!clean) return 0;
        const parts = clean.split('+').map(p => parseFloat(p));
        if (parts.some(isNaN)) return NaN;
        return parts.reduce((a, b) => a + b, 0);
    }

    function openKeypad() {
        haptic();
        _keypadExpr = (S.amount && S.amount > 0) ? String(S.amount) : '';
        updateKeypadDisplay();
        document.getElementById('calc-keypad').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeKeypad() {
        haptic();
        document.getElementById('calc-keypad').classList.remove('show');
        document.body.style.overflow = '';
    }

    function updateKeypadDisplay() {
        const el = document.getElementById('keypad-expr');
        if (!el) return;
        el.textContent = _keypadExpr || '0';
    }

    function updateKeypad(char) {
        haptic();
        if (char === 'clear') {
            _keypadExpr = '';
        } else if (char === 'back') {
            _keypadExpr = _keypadExpr.slice(0, -1);
        } else if (char === '+') {
            if (!_keypadExpr) return;
            if (/[+.]$/.test(_keypadExpr)) return;
            _keypadExpr += '+';
        } else if (char === '.') {
            const lastTerm = _keypadExpr.split('+').pop();
            if (!lastTerm) { _keypadExpr += '0.'; updateKeypadDisplay(); return; }
            if (lastTerm.includes('.')) return;
            _keypadExpr += '.';
        } else {
            // digit
            if (_keypadExpr.length >= 15) return;
            // strip leading zero if starting a new term and user types a non-zero digit
            const lastTerm = _keypadExpr.split('+').pop();
            if (lastTerm === '0' && char !== '0' && char !== '.') {
                _keypadExpr = _keypadExpr.slice(0, -1) + char;
            } else {
                _keypadExpr += char;
            }
        }
        updateKeypadDisplay();
        const result = safeEval(_keypadExpr);
        if (!isNaN(result)) {
            S.amount = result;
            const input = document.getElementById('calc-in');
            if (input) input.value = result > 0 ? Number(result.toFixed(2)).toLocaleString() : '';
            const targetEl = document.getElementById('hero-target-amount');
            if (targetEl) {
                const tv = (result > 0 && S.cr) ? (result * S.cr) : 0;
                targetEl.textContent = tv > 0
                    ? tv.toLocaleString(undefined, { maximumFractionDigits: 2 })
                    : '—';
            }
            const panel = document.getElementById('routing-panel');
            if (panel) { panel.innerHTML = renderRoutes(); tickRoutes(); }
            const pppSlot = document.getElementById('ppp-slot');
            if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
        }
    }

    // === v6.4 Infinite Anchor Engine ===
    // Search any item in any currency. LLM returns {emoji, label, price, currency}
    // cached directly into fx_anchors. Local GLOBAL_PPP_DB still seeds suggestion chips.
    const LLM_SEARCH_ENDPOINT = 'https://api.ourdomain.com/search-ppp';
    const LOCAL_CATS = ['food', 'grocery', 'tech', 'shopping'];

    function openDiscovery() {
        haptic();
        const d = t();
        document.getElementById('discovery-title').textContent = d.pppDiscoveryTitle;
        document.getElementById('discovery-disclaimer').textContent = d.pppDisclaimer;
        const input = document.getElementById('search-input');
        input.value = '';
        input.placeholder = d.searchPlaceholder;
        document.getElementById('search-submit').textContent = d.searchSubmit;
        document.getElementById('search-status').textContent = '';
        document.getElementById('search-status').className = '';
        renderSuggestions();
        document.getElementById('ppp-discovery').classList.add('show');
        document.body.style.overflow = 'hidden';
        setTimeout(() => input.focus(), 120);
    }

    function closeDiscovery() {
        haptic();
        document.getElementById('ppp-discovery').classList.remove('show');
        document.body.style.overflow = '';
    }

    function renderSuggestions() {
        const d = t();
        const data = GLOBAL_PPP_DB[S.base];
        const labelEl = document.getElementById('suggestions-label');
        const listEl = document.getElementById('suggestions-list');
        if (!data) {
            labelEl.textContent = '';
            listEl.innerHTML = '';
            return;
        }
        labelEl.textContent = d.suggestionsLabel.replace('{city}', data.city);
        // Flatten: pick 1 item per category for a compact popular strip
        const picks = [];
        LOCAL_CATS.forEach(cat => {
            const items = data[cat] || [];
            if (items.length > 0) picks.push({ cat, item: items[0] });
        });
        listEl.innerHTML = picks.map(p => `
            <button class="suggestion-chip" onclick="addSuggestedAnchor('${p.cat}', 0)">
                <span class="suggestion-emoji">${p.item.emoji}</span>
                <span class="suggestion-label">${escapeHtml(p.item.label)}</span>
                <span class="suggestion-price">${p.item.price} ${S.base}</span>
            </button>
        `).join('');
    }

    function addSuggestedAnchor(cat, idx) {
        haptic();
        const data = GLOBAL_PPP_DB[S.base];
        const item = data && data[cat] ? data[cat][idx] : null;
        if (!item) return;
        const d = t();
        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) {
            const status = document.getElementById('search-status');
            status.textContent = d.maxAnchors;
            status.className = 'error';
            return;
        }
        arr.push({
            emoji: item.emoji,
            label: `${item.label} (${data.city})`,
            price: item.price,
            currency: S.base
        });
        setAnchors(arr);
        const pppSlot = document.getElementById('ppp-slot');
        if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
        if (arr.length >= MAX_ANCHORS) { closeDiscovery(); return; }
        if (S.activeTab === 'backpack') renderContent();
        renderSuggestions();
    }

    async function searchAnchor() {
        haptic();
        const d = t();
        const input = document.getElementById('search-input');
        const status = document.getElementById('search-status');
        const submit = document.getElementById('search-submit');
        const query = (input.value || '').trim();
        if (!query) return;

        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) {
            status.textContent = d.maxAnchors;
            status.className = 'error';
            return;
        }

        submit.disabled = true;
        status.textContent = d.searching;
        status.className = '';

        try {
            const res = await fetch(LLM_SEARCH_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, currency: S.base })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const payload = await res.json();
            // Expected: { emoji, label, price, currency }
            if (!payload || typeof payload.price !== 'number' || !payload.label || !payload.currency) {
                throw new Error('Invalid response shape');
            }
            arr.push({
                emoji: payload.emoji || '🏷️',
                label: payload.label,
                price: payload.price,
                currency: payload.currency
            });
            setAnchors(arr);
            const pppSlot = document.getElementById('ppp-slot');
            if (pppSlot) { pppSlot.innerHTML = renderPPPContent(); tickPPP(); }
            if (S.activeTab === 'backpack') renderContent();
            input.value = '';
            status.textContent = '';
            if (arr.length >= MAX_ANCHORS) { closeDiscovery(); return; }
        } catch (err) {
            console.warn('[searchAnchor] failed:', err);
            status.textContent = d.searchError;
            status.className = 'error';
        } finally {
            submit.disabled = false;
        }
    }

    // === AA Splitter ===
    function calcSplit(bill, n, payer) {
        if (!S.cr || !bill || bill <= 0 || n <= 0) return null;
        const r = getWalletRates();
        let actualPaid;
        if (payer === 'zero')      actualPaid = bill * S.cr * (1 + r.zero);
        else if (payer === 'card') actualPaid = bill * S.cr * (1 + r.card);
        else                       actualPaid = bill * S.cr * (1 + r.card) + r.atm * S.cr;
        const perShare = actualPaid / n;
        const surchargePerHead = (actualPaid - bill * S.cr) / n;
        return { actualPaid, perShare, surchargePerHead };
    }
    function openSplitModal() {
        haptic();
        const routes = calcRouting(S.amount);
        S.splitPayer = routes ? routes[0].id : 'zero';
        S.splitPeople = 2;
        S.splitOpen = true;
        _prevSplit = 0; // Reset tick origin on each fresh open (ephemeral)
        const d = t();
        document.getElementById('split-title').textContent = d.splitHeader;
        renderSplitBody();
        document.getElementById('split-modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    function closeSplitModal() {
        S.splitOpen = false;
        _prevSplit = 0;
        document.getElementById('split-modal').classList.remove('show');
        document.body.style.overflow = '';
    }
    function incrementPeople(delta) {
        haptic();
        const next = S.splitPeople + delta;
        if (next < 2 || next > 10) return;
        S.splitPeople = next;
        renderSplitBody();
    }
    function setSplitPayer(method) {
        haptic();
        S.splitPayer = method;
        renderSplitBody();
    }
    function renderSplitBody() {
        const d = t();
        const body = document.getElementById('split-body');
        if (!body) return;
        if (!S.cr || !S.amount || S.amount <= 0) {
            body.innerHTML = `<div class="split-empty">${d.splitNoBill}</div>`;
            return;
        }
        const split = calcSplit(S.amount, S.splitPeople, S.splitPayer);
        const actualStr = Number(split.actualPaid.toFixed(2)).toLocaleString();
        const shareStr = Number(split.perShare.toFixed(2)).toLocaleString();
        const surchargeStr = Number(split.surchargePerHead.toFixed(2)).toLocaleString();
        const actualCopy = d.splitActualPaid.replace('{x}', actualStr).replace('{TARGET}', S.target);
        const surchargeCopy = d.splitSurchargeHint.replace('{x}', surchargeStr).replace('{TARGET}', S.target);
        const startStr = `${Number((_prevSplit || 0).toFixed(2)).toLocaleString()} ${S.target}`;
        body.innerHTML = `
            <div class="split-bill">
                <span class="split-label">${d.splitBillLabel}</span>
                <span class="split-bill-amt">${Number(S.amount).toLocaleString()} ${S.base}</span>
            </div>
            <div class="split-row">
                <span class="split-label">${d.splitPeopleLabel}</span>
                <div class="split-stepper">
                    <button class="split-step-btn" onclick="incrementPeople(-1)" ${S.splitPeople <= 2 ? 'disabled' : ''}>−</button>
                    <span class="split-step-val">${S.splitPeople}</span>
                    <button class="split-step-btn" onclick="incrementPeople(1)" ${S.splitPeople >= 10 ? 'disabled' : ''}>+</button>
                </div>
            </div>
            <div class="split-row-col">
                <span class="split-label">${d.splitPayerLabel}</span>
                <div class="split-seg">
                    <button class="split-seg-btn${S.splitPayer==='zero'?' active':''}" onclick="setSplitPayer('zero')">${d.splitPayerZero}</button>
                    <button class="split-seg-btn${S.splitPayer==='card'?' active':''}" onclick="setSplitPayer('card')">${d.splitPayerCard}</button>
                    <button class="split-seg-btn${S.splitPayer==='atm' ?' active':''}" onclick="setSplitPayer('atm')">${d.splitPayerAtm}</button>
                </div>
            </div>
            <div class="split-result">
                <div class="split-actual">${actualCopy}</div>
                <div class="split-per-share">${d.splitPerShare}<strong data-target="${split.perShare}">${startStr}</strong></div>
                ${split.surchargePerHead > 0.01 ? `<div class="split-hint">${surchargeCopy}</div>` : ''}
            </div>
        `;
        // Tick the per-share number smoothly
        const shareEl = body.querySelector('.split-per-share strong[data-target]');
        if (shareEl) {
            const target = split.perShare;
            const from = _prevSplit || 0;
            const targetCode = S.target;
            tickNumber(shareEl, from, target, 350, (v) => `${Number(v.toFixed(2)).toLocaleString()} ${targetCode}`);
            _prevSplit = target;
        }
    }

    // === Guide tab ===
    function vGuide() {
        const d = t();
        const interp = (s) => s.replace(/\{BASE\}/g, S.base).replace(/\{TARGET\}/g, S.target);
        const cards = d.guideCards.map((c, i) => {
            const open = S.openCard === i;
            return `
                <div class="flashcard${open ? ' open' : ''}" style="--stagger:${i + 1}" onclick="toggleCard(${i})">
                    <div class="flashcard-header">
                        <div class="flashcard-title">
                            <span class="flashcard-emoji">${c.emoji}</span>
                            <span class="flashcard-label">${interp(c.title)}</span>
                        </div>
                        <span class="flashcard-chevron">▼</span>
                    </div>
                    <div class="flashcard-body">${interp(c.body)}</div>
                </div>
            `;
        }).join('');
        return `
            <div class="bottom-sheet full">
                <div class="sheet-handle"></div>
                <section class="tab-header">
                    <h1 class="tab-title">${d.guideTitle}</h1>
                    <p class="tab-subtitle">${d.guideSubtitle}</p>
                </section>
                <section class="tab-body">${cards}</section>
            </div>
        `;
    }
    function toggleCard(i) {
        haptic();
        S.openCard = (S.openCard === i) ? null : i;
        renderContent();
    }

    // === Backpack tab ===
    function vBackpack() {
        const d = t();
        const hapticOn = localStorage.getItem('fx_haptic') !== 'off';
        const r = getWalletRates();
        const anchors = getAnchors();

        const anchorRows = anchors.map((a, idx) => `
            <div class="setting-card anchor-row">
                <div class="anchor-row-line">
                    <input class="anchor-emoji-in" type="text" maxlength="4"
                        value="${escapeAttr(a.emoji)}" placeholder="${d.anchorEmojiPh}"
                        onchange="updateAnchor(${idx}, 'emoji', this.value)">
                    <input class="anchor-label-in" type="text" maxlength="28"
                        value="${escapeAttr(a.label)}" placeholder="${d.anchorLabelPh}"
                        onchange="updateAnchor(${idx}, 'label', this.value)">
                    <input class="anchor-price-in" type="number" step="0.01" min="0"
                        value="${a.price || ''}" placeholder="0"
                        onchange="updateAnchor(${idx}, 'price', this.value)">
                    <button class="anchor-currency-btn" onclick="openCurrencyModal('anchor:${idx}')">${a.currency || S.target}</button>
                    <button class="anchor-delete-btn" onclick="removeAnchor(${idx})" aria-label="delete">✕</button>
                </div>
            </div>
        `).join('');

        const atMax = anchors.length >= MAX_ANCHORS;

        return `
            <div class="bottom-sheet full">
                <div class="sheet-handle"></div>
                <section class="tab-header">
                    <h1 class="tab-title">${d.backpackTitle}</h1>
                    <p class="tab-subtitle">${d.backpackSubtitle}</p>
                </section>
                <section class="tab-body">
                    <div class="setting-card toggle-row" onclick="toggleHaptic()">
                        <span class="setting-label">${d.hapticLabel}</span>
                        <span class="setting-val">${hapticOn ? d.on : d.off}</span>
                    </div>

                    <div class="wallet-section-title">${d.walletRatesTitle}</div>

                    <div class="setting-card">
                        <div class="setting-row-top">
                            <span class="setting-label">${d.rateZeroLabel}</span>
                            <div>
                                <input class="setting-input" type="number" step="0.01" min="0" value="${(r.zero * 100).toFixed(2)}"
                                    oninput="setWalletRate('fx_rate_zero', parseFloat(this.value) / 100)">
                                <span class="setting-unit">%</span>
                            </div>
                        </div>
                        <div class="setting-origin">${d.rateZeroOrigin}</div>
                    </div>

                    <div class="setting-card">
                        <div class="setting-row-top">
                            <span class="setting-label">${d.rateCardLabel}</span>
                            <div>
                                <input class="setting-input" type="number" step="0.01" min="0" value="${(r.card * 100).toFixed(2)}"
                                    oninput="setWalletRate('fx_rate_card', parseFloat(this.value) / 100)">
                                <span class="setting-unit">%</span>
                            </div>
                        </div>
                        <div class="setting-origin">${d.rateCardOrigin}</div>
                    </div>

                    <div class="setting-card">
                        <div class="setting-row-top">
                            <span class="setting-label">${d.feeAtmLabel}</span>
                            <div>
                                <input class="setting-input" type="number" step="0.5" min="0" value="${r.atm}"
                                    oninput="setWalletRate('fx_fee_atm', parseFloat(this.value))">
                                <span class="setting-unit">${S.base}</span>
                            </div>
                        </div>
                        <div class="setting-origin">${d.feeAtmOrigin}</div>
                    </div>

                    <div class="wallet-section-title">${d.anchorsTitle}</div>
                    <div class="wallet-section-hint">${d.anchorsHint}</div>
                    ${anchorRows}
                    <button class="anchor-add-btn" onclick="openDiscovery()" ${atMax ? 'disabled' : ''}>${d.anchorDiscover}</button>

                    <div class="setting-card toggle-row danger" onclick="haptic(); localStorage.clear(); location.reload()">
                        <span class="setting-label">${d.clearLabel}</span>
                        <span class="setting-val">⚠</span>
                    </div>

                    <div class="footer">
                        ${d.slogan}
                    </div>
                </section>
            </div>
        `;
    }

    function renderDock() {
        document.getElementById('dock').innerHTML = t().dock.map(td => `
            <button class="dock-btn${S.activeTab===td.id?' active':''}" onclick="haptic(); S.activeTab='${td.id}'; S.openCard=null; renderContent();">
                ${ICONS[td.icon]}
                <span class="dock-lbl">${td.lbl}</span>
            </button>
        `).join('');
    }

    async function init() {
        applyI18n();
        renderLangSwitch();
        seedAnchorsIfEmpty();
        await fetchR();
        renderContent();
    }

    init();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
</script>

</body>
