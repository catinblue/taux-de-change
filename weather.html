<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>FX Weather</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0D1213">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* === Lumina Palette === */
            --black-base: #0D1213;
            --forest-dark: #2D3934;
            --sage-light: #D2DCD5;
            --sage-mid: #BECCC2;
            --accent-green: #5A9374;
            --card-bg: #FFFFFF;
            --text-main: var(--black-base);
            --text-inverse: var(--sage-light);
            --safe-b: env(safe-area-inset-bottom);

            /* === Compat aliases so existing JS var() references still evaluate
                   (calcAtmTier hardcodes var(--red), var(--amber), var(--green); kept
                   intentionally stable so the business logic isn't touched)    === */
            --text: var(--text-main);
            --text2: var(--sage-mid);
            --accent: var(--accent-green);
            --green: var(--accent-green);
            --red: var(--forest-dark);   /* No red alerts in Lumina — "bad" reads as deep forest */
            --amber: var(--sage-mid);    /* "caution" reads as muted sage */
            --line: rgba(13, 18, 19, 0.1);
            --bg: var(--sage-light);
            --surface: var(--sage-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif;
            background: linear-gradient(160deg,
                var(--hero-grad-1, var(--black-base)) 0%,
                var(--hero-grad-2, var(--black-base)) 100%);
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased; line-height: 1.4;
            overflow: hidden;
            height: 100dvh;
            transition: background 0.5s ease;
        }

        .layout {
            width: 100%; max-width: 500px; margin: 0 auto;
            height: 100dvh;
            display: flex; flex-direction: column;
            position: relative;
        }
        #content {
            flex: 1; min-height: 0;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* === v7.0 Site header: transparent, over dynamic dark gradient === */
        .site-header {
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            padding: calc(14px + env(safe-area-inset-top)) 26px 6px;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .logo {
            font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
            text-transform: uppercase; color: rgba(255, 255, 255, 0.85);
        }
        .lang-switch {
            display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .lang-option {
            color: rgba(255, 255, 255, 0.45); padding: 4px 2px; cursor: pointer;
            transition: color 0.2s ease;
        }
        .lang-option.active { color: #FFFFFF; font-weight: 600; }
        .lang-sep { color: rgba(255, 255, 255, 0.2); }

        /* === v7.0 Hero — floating blocks on dark gradient === */
        .hero {
            background: transparent;
            color: #FFFFFF;
            padding: 10px 26px 22px;
            margin: 0;
            flex-shrink: 0;
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            gap: 14px;
        }

        .hero-block { display: flex; flex-direction: column; gap: 4px; }
        .hero-row {
            display: flex; align-items: flex-end; justify-content: space-between;
            gap: 12px;
        }
        .hero-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
        }
        .pair-selector {
            display: inline-flex; align-items: center; gap: 8px;
            background: transparent; padding: 0;
            font-size: 10px; font-weight: 600; letter-spacing: 1.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
        }
        .pair-sep { color: rgba(255, 255, 255, 0.3); font-weight: 400; }
        .picker-unit {
            cursor: pointer; padding: 2px 2px;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 1.8px;
            transition: opacity 0.15s ease;
        }
        .picker-unit:active { opacity: 0.55; }

        .amount-wrap {
            display: flex; flex-direction: column; gap: 0;
            align-items: stretch;
        }
        .hero-amount-input {
            background: none; border: none;
            color: #FFFFFF;
            font-size: clamp(64px, 18vw, 92px); font-weight: 200;
            letter-spacing: -0.03em; line-height: 1;
            outline: none; width: 100%; padding: 0;
            font-family: inherit;
            text-align: right;
            caret-color: #FFFFFF;
            cursor: pointer; user-select: none;
            display: flex; justify-content: flex-end; align-items: baseline;
            min-height: 1em;
            font-variant-numeric: tabular-nums;
        }
        #hero-amount-text:empty::before { content: '0'; opacity: 0.22; }
        .hero-cursor {
            display: inline-block;
            width: 2px; height: 0.72em;
            background: #FFFFFF;
            margin-left: 6px;
            align-self: center;
            animation: cursorBlink 1s step-end infinite;
        }
        @keyframes cursorBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        .hero-keypad-hint {
            font-size: 10px; font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-top: 6px; text-align: right;
            pointer-events: none;
        }
        .hero-target-amount {
            color: rgba(255, 255, 255, 0.82);
            font-size: clamp(52px, 14vw, 74px); font-weight: 200;
            letter-spacing: -0.02em; line-height: 1;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* Hairline divider with swap icon */
        .hero-divider {
            display: flex; align-items: center; gap: 10px;
            padding: 2px 0;
        }
        .hero-swap-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.7);
            width: 24px; height: 24px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-family: inherit;
            flex-shrink: 0;
        }
        .hero-swap-btn:active { opacity: 0.5; }
        .hero-swap-icon {
            width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.6;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
        }
        .hero-divider-line {
            flex: 1; height: 1px; background: rgba(255, 255, 255, 0.12);
        }

        /* Label row above amount (e.g. EUR · Euro) */
        .hero-amount-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1.8px;
            color: rgba(255, 255, 255, 0.55); text-transform: uppercase;
            margin-top: 4px;
        }

        /* Action pills row (glass) */
        .action-pills {
            display: flex; gap: 8px; flex-wrap: wrap;
            padding: 4px 0 0;
        }
        .action-pill {
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            padding: 7px 14px;
            color: rgba(255, 255, 255, 0.88);
            font-size: 10px; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
            font-family: inherit; cursor: pointer;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            transition: background 0.2s ease, opacity 0.15s ease;
        }
        .action-pill:active { background: rgba(0, 0, 0, 0.35); }
        .action-pill-icon { opacity: 0.85; margin-right: 5px; }

        /* === v7.2 Zen trigger (small button top-right of hero) === */
        .hero { position: relative; }
        .zen-trigger {
            position: absolute;
            top: 6px; right: 0;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            width: 32px; height: 32px;
            color: rgba(255, 255, 255, 0.78);
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            transition: background 0.15s ease, transform 0.1s ease;
            z-index: 4;
        }
        .zen-trigger:active { background: rgba(0, 0, 0, 0.4); transform: scale(0.92); }
        .zen-trigger-icon {
            width: 14px; height: 14px;
            stroke: currentColor; stroke-width: 1.6;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
        }

        /* === v7.2 Zen overlay (pitch black, just numbers) === */
        .zen-overlay {
            position: fixed; inset: 0;
            background: #000000;
            z-index: 11000;
            display: none;
            align-items: center; justify-content: center;
            color: #FFFFFF;
            -webkit-tap-highlight-color: transparent;
        }
        .zen-overlay.show {
            display: flex;
            animation: zenFadeIn 0.4s ease;
        }
        @keyframes zenFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .zen-exit {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 14px);
            left: 16px;
            background: none; border: none;
            color: rgba(255, 255, 255, 0.45);
            font-size: 22px; font-weight: 200;
            cursor: pointer; font-family: inherit;
            padding: 8px 12px;
        }
        .zen-exit:active { color: rgba(255, 255, 255, 0.85); }
        .zen-stack {
            display: flex; flex-direction: column; align-items: center;
            gap: 0; padding: 0 24px;
        }
        .zen-target {
            font-size: clamp(76px, 21vw, 132px);
            font-weight: 200; letter-spacing: -0.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .zen-target-code {
            font-size: 11px; font-weight: 600; letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 8px;
        }
        .zen-divider {
            width: 64px; height: 1px;
            background: rgba(255, 255, 255, 0.18);
            margin: 28px 0;
        }
        .zen-base {
            font-size: clamp(36px, 9vw, 56px);
            font-weight: 200; letter-spacing: -0.02em;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .zen-base-code {
            font-size: 10px; font-weight: 600; letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        /* === v7.2.1 Tax-Free Radar === */
        .vat-radar { margin-top: 6px; }
        .vat-radar:empty { display: none; }
        .vat-radar-gap {
            font-size: 11px; font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.2px;
            line-height: 1.4;
            padding: 2px 4px;
        }
        .vat-radar-eligible, .vat-radar-active {
            display: inline-flex; align-items: center;
            background: rgba(90, 147, 116, 0.18);
            border: 1px solid rgba(90, 147, 116, 0.5);
            border-radius: 999px;
            padding: 7px 14px;
            color: var(--accent-green);
            font-family: inherit; font-size: 11px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            transition: background 0.15s ease, transform 0.1s ease;
            box-shadow: 0 0 0 0 rgba(90, 147, 116, 0);
            animation: vatPulse 2.4s ease-in-out infinite;
        }
        .vat-radar-eligible:active, .vat-radar-active:active {
            background: rgba(90, 147, 116, 0.35);
            transform: scale(0.97);
        }
        .vat-radar-active {
            background: rgba(90, 147, 116, 0.35);
            border-color: rgba(90, 147, 116, 0.7);
            color: #FFFFFF;
        }
        @keyframes vatPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(90, 147, 116, 0.22); }
            50%      { box-shadow: 0 0 0 6px rgba(90, 147, 116, 0); }
        }
        .vat-radar-uk {
            font-size: 11px; font-weight: 500;
            color: rgba(255, 200, 200, 0.85);
            background: rgba(180, 60, 60, 0.18);
            border: 1px solid rgba(180, 60, 60, 0.32);
            border-radius: 12px;
            padding: 8px 12px;
            line-height: 1.4;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
        }
        .vat-radar-dcc {
            margin-top: 8px;
            font-size: 10px; font-weight: 400;
            color: rgba(255, 220, 180, 0.7);
            letter-spacing: 0.2px;
            line-height: 1.4;
            padding: 7px 10px;
            background: rgba(0, 0, 0, 0.28);
            border: 1px solid rgba(255, 200, 100, 0.18);
            border-radius: 10px;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            animation: dccFadeIn 0.4s ease both;
        }
        @keyframes dccFadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Lumina Flip: hero amounts strikethrough → green slide-in */
        @keyframes luminaFlip {
            0%   { opacity: 1; transform: translateY(0); }
            35%  { opacity: 0; transform: translateY(10px); }
            41%  { opacity: 0; transform: translateY(-14px); }
            65%  { opacity: 1; transform: translateY(0); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .lumina-flipping {
            animation: luminaFlip 0.55s cubic-bezier(0.4, 0.2, 0.4, 1) both;
        }
        #hero-amount-text.savings-on,
        .hero-target-amount.savings-on {
            color: var(--accent-green) !important;
        }

        /* === v7.2 Hero contextual tip strip === */
        .hero-tip-strip {
            font-size: 11px; font-weight: 400;
            color: rgba(255, 255, 255, 0.62);
            letter-spacing: 0.2px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-top: 4px;
            line-height: 1.4;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
        }

        .weather-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.55);
            text-transform: uppercase;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* === v7.0 Bottom Sheet: pure white, rounded top, holds routes/ppp/split === */
        .bottom-sheet {
            background: #FFFFFF;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.28);
            flex: 1; min-height: 0;
            overflow-y: auto;
            padding: 0 22px calc(96px + var(--safe-b));
            color: var(--text-main);
            position: relative;
            display: flex; flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }
        .bottom-sheet.full {
            /* Guide / Backpack tabs — sheet eats most of the viewport */
            margin-top: 8px;
        }
        .sheet-handle {
            width: 36px; height: 4px;
            background: #E0E0E0; border-radius: 2px;
            margin: 10px auto 6px;
            flex-shrink: 0;
        }

        /* === v7.0 PPP inside the sheet (anchors = minimalist rows) === */
        .ppp-bar {
            background: none;
            border-radius: 0;
            padding: 10px 0 4px;
            margin: 0;
            display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }
        .ppp-line {
            font-size: 13px; font-weight: 400; color: var(--text-main);
            letter-spacing: 0.1px;
            cursor: pointer;
            padding: 6px 0;
            transition: opacity 0.2s ease;
        }
        .ppp-line:active { opacity: 0.55; background: transparent; }
        .ppp-line strong { color: var(--accent-green); font-weight: 600; }
        .ppp-line.editing {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            cursor: default;
        }
        .ppp-line.editing:active { background: transparent; }
        .ppp-price-edit, .ppp-label-edit {
            background: #F5F5F7; border: 1px solid #EEEEEE;
            border-radius: 8px; padding: 5px 8px;
            font-family: inherit; font-size: 12px; font-weight: 500;
            color: var(--text-main); outline: none;
        }
        .ppp-price-edit:focus, .ppp-label-edit:focus { border-color: var(--accent-green); }
        .ppp-price-edit { width: 68px; text-align: right; }
        .ppp-label-edit { flex: 1; min-width: 100px; }
        .ppp-save-btn {
            background: var(--accent-green); color: #FFFFFF; border: none;
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 700; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }

        /* === v7.0 Routes: minimalist list on white === */
        .routes-section {
            padding: 0;
            min-height: 0;
        }
        .section-label {
            font-size: 10px; font-weight: 600; color: var(--text-main);
            opacity: 0.55;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 18px 0 2px;
        }

        /* DCC shield: thin left accent, black text */
        .dcc-shield {
            background: none;
            border: none;
            border-left: 2px solid var(--accent-green);
            border-radius: 0;
            padding: 8px 0 8px 12px;
            margin: 14px 0 4px;
            font-size: 11px; font-weight: 400; line-height: 1.55;
            color: var(--text-main);
        }
        .dcc-shield-icon { margin-right: 6px; font-weight: 600; color: var(--accent-green); }

        /* First-run banner: thin divider, minimal */
        .first-run-banner {
            background: none;
            border: none;
            border-radius: 0;
            padding: 12px 0;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            font-size: 11px; font-weight: 400; color: var(--text-main);
            margin: 0;
            cursor: pointer;
            border-top: 1px solid #F0F0F0;
        }
        .banner-text { flex: 1; line-height: 1.4; }
        .banner-close {
            background: none; border: none; color: #BBBBBB;
            font-size: 15px; cursor: pointer; padding: 0 4px; line-height: 1;
            font-family: inherit;
        }

        /* === v7.0 Route rows: black-on-white, faint dividers, best = bold green === */
        .route-card {
            background: none;
            border: none;
            border-radius: 0;
            padding: 16px 0;
            margin: 0;
            display: flex; flex-direction: column; gap: 4px;
            border-top: 1px solid #F0F0F0;
            transition: opacity 0.3s ease;
        }
        #routing-panel .route-card:first-child { border-top: 0; padding-top: 8px; }
        .route-card.best { padding: 16px 0; border-top: 1px solid #F0F0F0; }
        #routing-panel .route-card.best:first-child { border-top: 0; }

        .route-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2px;
        }
        .route-method {
            font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
            color: var(--text-main); text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
            opacity: 0.72;
        }
        .route-card.best .route-method {
            color: var(--accent-green); opacity: 1; font-weight: 600;
        }
        .route-icon {
            width: 14px; height: 14px;
            stroke: currentColor; stroke-width: 1.6; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .best-pill {
            background: none;
            color: var(--accent-green);
            font-size: 9px; font-weight: 600; letter-spacing: 1.4px;
            padding: 0; border-radius: 0;
            text-transform: uppercase;
        }
        .route-cost-line {
            display: flex; justify-content: space-between; align-items: baseline;
            gap: 8px;
        }
        .route-cost {
            font-size: 26px; font-weight: 300; color: var(--text-main);
            letter-spacing: -0.02em;
            max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }
        .route-card.best .route-cost { color: var(--accent-green); font-weight: 600; }
        .route-code {
            font-size: 11px; font-weight: 600; color: var(--text-main); opacity: 0.4;
            letter-spacing: 1px;
        }
        .route-hint {
            font-size: 11px; font-weight: 400; color: var(--text-main);
            opacity: 0.62;
            margin-top: 2px; line-height: 1.4;
        }
        .route-delta {
            font-size: 10px; font-weight: 500; color: var(--text-main);
            opacity: 0.55;
            margin-top: 2px; letter-spacing: 0.3px;
        }

        /* === ATM slider (inside white sheet) === */
        .atm-expand-btn {
            background: none; border: none; color: var(--text-main);
            font-weight: 600; font-size: 10px; cursor: pointer;
            font-family: inherit; padding: 8px 0 4px;
            letter-spacing: 1.5px; text-transform: uppercase;
            align-self: flex-start;
            border-bottom: 1px solid var(--text-main);
            margin-top: 4px;
            opacity: 0.72;
        }
        .atm-slider-panel {
            max-height: 0; overflow: hidden;
            transition: max-height 0.28s ease, padding-top 0.28s ease;
            padding-top: 0;
        }
        .atm-slider-panel.open { max-height: 260px; padding-top: 16px; }
        .atm-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px; border-radius: 3px;
            background: linear-gradient(90deg, #E8E8E8, var(--accent-green));
            outline: none; margin: 0;
        }
        .atm-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px; border-radius: 50%;
            background: #FFFFFF; border: 2px solid var(--accent-green);
            cursor: pointer; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.14);
        }
        .atm-slider::-moz-range-thumb {
            width: 20px; height: 20px; border-radius: 50%;
            background: #FFFFFF; border: 2px solid var(--accent-green); cursor: pointer;
        }
        .atm-readout {
            display: flex; flex-wrap: wrap; align-items: baseline;
            gap: 6px; margin-top: 14px;
            font-size: 12px; font-weight: 400; color: var(--text-main);
        }
        .atm-readout strong { font-weight: 600; }
        .atm-arrow { opacity: 0.4; }
        .atm-slider-hint {
            font-size: 10px; color: var(--text-main);
            opacity: 0.6;
            margin-top: 10px; font-weight: 400; line-height: 1.4;
        }
        .atm-edit-link {
            color: var(--accent-green); cursor: pointer; font-weight: 600;
            text-decoration: underline;
        }

        /* === v7.2 Local Anchor CTA (glowing dashed pill on Weather tab) === */
        .local-anchor-cta {
            width: 100%;
            margin-top: 14px;
            padding: 14px 18px;
            background: rgba(90, 147, 116, 0.06);
            border: 1px dashed rgba(90, 147, 116, 0.5);
            border-radius: 14px;
            color: var(--accent-green);
            font-family: inherit; font-size: 11px; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: background 0.15s ease, transform 0.1s ease;
            animation: anchorPulse 2.6s ease-in-out infinite;
        }
        .local-anchor-cta:active:not(:disabled) {
            transform: scale(0.985);
            background: rgba(90, 147, 116, 0.14);
        }
        .local-anchor-cta:disabled { opacity: 0.32; cursor: not-allowed; animation: none; }
        @keyframes anchorPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(90, 147, 116, 0.18); }
            50%      { box-shadow: 0 0 0 5px rgba(90, 147, 116, 0); }
        }

        /* === v7.2 Rate-info ⓘ icon + popover === */
        .info-icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px;
            margin-left: 5px;
            border: none; background: none;
            color: var(--accent-green);
            font-size: 12px; line-height: 1;
            font-family: inherit; cursor: pointer;
            opacity: 0.62;
            vertical-align: middle;
            transition: opacity 0.15s ease, transform 0.1s ease;
        }
        .info-icon-btn:hover  { opacity: 1; }
        .info-icon-btn:active { transform: scale(0.92); opacity: 1; }
        .rate-info-sheet { padding: 14px 22px calc(28px + var(--safe-b)); }
        .rate-info-body {
            font-size: 13px; font-weight: 400; line-height: 1.6;
            color: var(--text-main); opacity: 0.85;
            padding: 8px 4px 4px;
            white-space: pre-wrap;
        }

        /* === v7.2 PPP visceral progress strip === */
        #ppp-progress-slot {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #F0F0F0;
            font-size: 12px; font-weight: 500;
            color: var(--text-main); opacity: 0.78;
            line-height: 1.6; letter-spacing: 0.3px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        #ppp-progress-slot:empty {
            border-top: 0; margin-top: 0; padding-top: 0;
        }

        /* === Split CTA (accent-green pill inside sheet) === */
        .split-trigger-btn {
            background: var(--accent-green); border: none; color: #FFFFFF;
            font-weight: 600; font-size: 11px; cursor: pointer;
            font-family: inherit; padding: 14px 24px;
            border-radius: 999px; width: 100%;
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-top: 18px;
        }

        /* === Time Machine (inside white sheet) === */
        .time-machine {
            background: none;
            border: none;
            border-radius: 0;
            padding: 22px 0 8px;
            margin-top: 22px;
            border-top: 1px solid #F0F0F0;
        }
        .time-machine-tag {
            font-size: 10px; font-weight: 600; color: var(--text-main); opacity: 0.55;
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
        }
        .time-machine-text {
            font-size: 13px; font-weight: 400; line-height: 1.55; color: var(--text-main);
        }
        .time-machine-text .delta-save { color: var(--accent-green); font-weight: 600; }
        .time-machine-text .delta-cost { color: var(--text-main); font-weight: 600; }

        /* === v7.0 Guide / Backpack tab header === */
        .tab-header { padding: 14px 2px 12px; }
        .tab-title {
            font-size: 28px; font-weight: 300; letter-spacing: -0.02em;
            color: var(--text-main); line-height: 1.1;
        }
        .tab-subtitle {
            font-size: 12px; font-weight: 400; color: var(--text-main);
            opacity: 0.62;
            margin-top: 6px; letter-spacing: 0.1px;
        }
        .tab-body { padding: 0; }

        /* === v7.3 Guide section labels + Live Intel feed === */
        .guide-section-label {
            font-size: 10px; font-weight: 600;
            color: var(--text-main); opacity: 0.55;
            text-transform: uppercase; letter-spacing: 1.5px;
            padding: 18px 0 8px;
        }
        .guide-section-label.intel-section {
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
            margin-top: 12px;
        }
        .intel-card {
            position: relative;
        }
        .intel-card .flashcard-label::after {
            content: 'AI';
            display: inline-block;
            font-size: 8px; font-weight: 700; letter-spacing: 0.8px;
            color: var(--accent-green);
            background: rgba(90, 147, 116, 0.12);
            border: 1px solid rgba(90, 147, 116, 0.3);
            border-radius: 4px;
            padding: 1px 4px;
            margin-left: 6px;
            vertical-align: middle;
            line-height: 1;
        }
        .intel-loading {
            font-size: 12px; font-weight: 400;
            color: var(--text-main); opacity: 0.6;
            padding: 22px 0;
            text-align: center;
            line-height: 1.5;
            animation: intelPulse 1.6s ease-in-out infinite;
        }
        @keyframes intelPulse {
            0%, 100% { opacity: 0.4; }
            50%      { opacity: 0.85; }
        }
        .intel-error {
            font-size: 11px; font-weight: 400;
            color: var(--text-main); opacity: 0.55;
            padding: 14px 4px;
            line-height: 1.5;
        }
        .intel-disclaimer {
            font-size: 10px; font-weight: 400;
            color: var(--text-main); opacity: 0.45;
            padding: 16px 4px 4px;
            text-align: center;
            line-height: 1.4;
            letter-spacing: 0.2px;
        }

        /* === v7.0 Flashcards: minimalist accordion rows on white === */
        .flashcard {
            background: none;
            border: none;
            border-radius: 0;
            margin: 0;
            overflow: hidden; cursor: pointer;
            border-top: 1px solid #F0F0F0;
            transition: all 0.3s ease;
        }
        .tab-body > .flashcard:first-child { border-top: 0; }
        .flashcard-header {
            padding: 20px 0;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
        }
        .flashcard-title { display: flex; align-items: center; gap: 12px; flex: 1; }
        .flashcard-emoji { font-size: 22px; flex-shrink: 0; }
        .flashcard-label {
            font-size: 13px; font-weight: 500; color: var(--text-main); line-height: 1.3;
        }
        .flashcard-chevron {
            font-size: 10px; color: #BBBBBB; transition: transform 0.25s ease;
        }
        .flashcard.open .flashcard-chevron { transform: rotate(180deg); }
        .flashcard-body {
            max-height: 0; overflow: hidden;
            padding: 0; transition: all 0.3s ease;
            font-size: 12px; font-weight: 400; line-height: 1.6; color: var(--text-main);
            opacity: 0.78;
        }
        .flashcard.open .flashcard-body { max-height: 320px; padding: 0 0 20px 34px; }

        /* === v7.0 Backpack settings: minimalist rows on white === */
        .setting-card {
            background: none;
            border: none;
            border-radius: 0;
            padding: 16px 0; margin: 0;
            display: flex; flex-direction: column; gap: 6px;
            border-top: 1px solid #F0F0F0;
        }
        .tab-body > .setting-card:first-of-type { border-top: 0; }
        .setting-card.toggle-row {
            flex-direction: row; justify-content: space-between; align-items: center;
            cursor: pointer; padding: 18px 0;
        }
        .setting-label { font-size: 13px; font-weight: 500; color: var(--text-main); }
        .setting-val {
            font-size: 12px; font-weight: 600; color: var(--text-main); opacity: 0.72;
            letter-spacing: 0.3px;
        }
        .setting-row-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .setting-input {
            background: none; border: none; color: var(--text-main);
            font-size: 16px; font-weight: 400; text-align: right;
            width: 70px; outline: none; font-family: inherit;
            border-bottom: 1px solid #EEEEEE; padding: 2px 0;
            font-variant-numeric: tabular-nums;
        }
        .setting-input:focus { border-bottom-color: var(--accent-green); }
        .setting-unit { font-size: 12px; font-weight: 600; color: var(--text-main); opacity: 0.5; margin-left: 4px; }
        .setting-origin {
            font-size: 10px; font-weight: 400; color: var(--text-main);
            opacity: 0.55;
            line-height: 1.4;
        }
        .setting-card.danger { margin-top: 24px; border-top: 1px solid #F0F0F0; }
        .setting-card.danger .setting-label { color: var(--text-main); font-weight: 600; letter-spacing: 0.3px; opacity: 0.85; }

        .wallet-section-title {
            font-size: 10px; font-weight: 600; color: var(--text-main); opacity: 0.55;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 22px 2px 8px;
        }
        .wallet-section-hint {
            font-size: 11px; font-weight: 400; color: var(--text-main);
            opacity: 0.62;
            margin: -4px 2px 10px; line-height: 1.4;
        }

        /* === v7.0 Anchor rows (minimalist on white) === */
        .anchor-row { padding: 12px 0; }
        .anchor-row-line {
            display: grid;
            grid-template-columns: 32px 1fr 68px 50px 22px;
            gap: 6px; align-items: center;
        }
        .anchor-emoji-in, .anchor-label-in, .anchor-price-in {
            background: none; border: none; color: var(--text-main);
            font-weight: 400; font-size: 13px; outline: none; font-family: inherit;
            border-bottom: 1px solid #EEEEEE; padding: 4px 2px;
        }
        .anchor-emoji-in { font-size: 16px; text-align: center; }
        .anchor-label-in { width: 100%; }
        .anchor-price-in { text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; }
        .anchor-emoji-in:focus, .anchor-label-in:focus, .anchor-price-in:focus {
            border-bottom-color: var(--accent-green);
        }
        .anchor-currency-btn {
            background: #F5F5F7; border: none; border-radius: 8px;
            color: var(--text-main); font-weight: 600; font-size: 11px;
            cursor: pointer; padding: 6px 4px; font-family: inherit;
            letter-spacing: 0.3px;
        }
        .anchor-delete-btn {
            background: none; border: none; color: #CCCCCC;
            font-size: 15px; cursor: pointer; padding: 2px; line-height: 1;
            font-family: inherit;
        }
        .anchor-add-btn {
            background: transparent;
            border: none;
            padding: 16px 0; width: 100%;
            color: var(--accent-green); font-weight: 600; font-size: 11px;
            cursor: pointer; font-family: inherit; margin-top: 4px;
            letter-spacing: 1.5px; text-transform: uppercase;
            text-align: left;
            border-top: 1px solid #F0F0F0;
        }
        .anchor-add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .footer {
            padding: 30px 0 14px; text-align: center;
            color: var(--text-main); font-size: 11px; line-height: 1.7;
            letter-spacing: 0.3px; opacity: 0.45;
            font-weight: 400;
        }

        /* === v7.0 Dock — sits flush on white sheet === */
        .dock {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px;
            height: calc(66px + var(--safe-b));
            background: #FFFFFF;
            border-top: 1px solid #F0F0F0;
            display: flex; justify-content: space-around;
            padding: 4px 0 var(--safe-b);
            z-index: 9999;
        }
        .dock-btn {
            flex: 1; border: none; background: none;
            color: rgba(13, 18, 19, 0.4);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 3px;
            cursor: pointer; min-height: 44px; padding: 6px;
            font-family: inherit;
            transition: color 0.2s ease;
        }
        .dock-btn.active { color: var(--accent-green); }
        .dock-icon {
            width: 20px; height: 20px;
            stroke: currentColor; stroke-width: 1.6;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
        }
        .dock-lbl {
            font-size: 9px; font-weight: 600; letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* === Modals — v7.0 white sheets on dim backdrop === */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55);
            z-index: 10000; display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            width: 100%; max-width: 500px; margin: 0 auto;
            background: #FFFFFF;
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            padding: 24px 22px calc(24px + var(--safe-b));
            transform: translateY(100%);
            transition: transform 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
        }
        .modal-overlay.show .modal-sheet { transform: translateY(0); }
        .modal-header {
            font-size: 10px; font-weight: 600; text-align: center;
            margin-bottom: 18px; color: var(--text-main);
            text-transform: uppercase; letter-spacing: 1.8px;
            opacity: 0.7;
        }
        .modal-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            max-height: 50vh; overflow-y: auto; padding-bottom: 4px;
        }
        .modal-item {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px; border-radius: 14px;
            background: #F5F5F7;
            font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-main);
            border: 1px solid transparent;
            transition: background 0.15s, transform 0.12s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .modal-item.active { background: var(--accent-green); color: #FFFFFF; border-color: var(--accent-green); font-weight: 600; }
        .modal-flag { font-size: 18px; }

        /* === v7.0 Split modal === */
        .split-sheet { padding-bottom: calc(30px + var(--safe-b)); }
        .split-bill {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 18px; padding-bottom: 14px;
            border-bottom: 1px solid #F0F0F0;
        }
        .split-bill-amt { font-size: 22px; font-weight: 300; letter-spacing: -0.02em; color: var(--text-main); font-variant-numeric: tabular-nums; }
        .split-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .split-row-col { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
        .split-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
            color: var(--text-main); opacity: 0.62;
            text-transform: uppercase;
        }
        .split-stepper { display: flex; align-items: center; gap: 14px; }
        .split-step-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid #EEEEEE;
            background: #F5F5F7; color: var(--text-main);
            font-size: 16px; font-weight: 400; cursor: pointer;
            font-family: inherit; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .split-step-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .split-step-val { min-width: 30px; text-align: center; font-size: 20px; font-weight: 300; letter-spacing: -0.01em; color: var(--text-main); font-variant-numeric: tabular-nums; }
        .split-seg { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .split-seg-btn {
            padding: 10px 4px; border-radius: 10px;
            border: 1px solid #EEEEEE; background: #F5F5F7;
            color: var(--text-main); cursor: pointer;
            font-size: 11px; font-weight: 500; font-family: inherit;
            letter-spacing: 0.3px; line-height: 1.3;
            transition: background 0.15s;
        }
        .split-seg-btn.active { background: var(--accent-green); color: #FFFFFF; border-color: var(--accent-green); font-weight: 600; }
        .split-result {
            margin-top: 18px; padding: 18px;
            background: #F5F5F7; border-radius: 16px;
        }
        .split-actual { font-size: 11px; font-weight: 500; color: var(--text-main); opacity: 0.6; margin-bottom: 6px; letter-spacing: 0.3px; }
        .split-per-share { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text-main); }
        .split-per-share strong {
            font-size: 28px; font-weight: 300; color: var(--accent-green);
            letter-spacing: -0.02em; display: block; margin-top: 2px;
            transition: color 0.35s ease;
            font-variant-numeric: tabular-nums;
        }
        .split-hint { font-size: 10px; color: var(--text-main); opacity: 0.55; font-weight: 400; margin-top: 6px; }
        .split-empty {
            padding: 30px 10px; text-align: center;
            color: var(--text-main); opacity: 0.55; font-size: 12px; font-weight: 400; line-height: 1.5;
        }

        ::-webkit-scrollbar { display: none; }

        /* === v7.0 Ghost numpad — 3x4 grid, no bg, no borders === */
        .keypad-sheet {
            padding: 0 18px calc(18px + var(--safe-b));
            max-height: 72vh;
            background: #FFFFFF;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.28);
        }
        .keypad-display {
            padding: 14px 8px 14px;
            font-size: 26px; font-weight: 300; color: var(--text-main);
            text-align: right; letter-spacing: -0.02em;
            min-height: 50px;
            word-break: break-all; overflow-wrap: break-word;
            border-bottom: 1px solid #F0F0F0;
            margin-bottom: 6px;
            font-variant-numeric: tabular-nums;
        }
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            padding: 4px 0;
        }
        .keypad-btn {
            aspect-ratio: 1.55 / 1;
            background: transparent;
            border: none; border-radius: 16px;
            color: var(--text-main);
            font-family: inherit; font-size: 28px; font-weight: 400;
            cursor: pointer; letter-spacing: -0.01em;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .keypad-btn:active:not(:disabled) {
            background: rgba(13, 18, 19, 0.06);
            transform: scale(0.96);
        }
        .keypad-btn.keypad-alt {
            color: rgba(13, 18, 19, 0.55);
            font-weight: 300;
        }
        .keypad-ops {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            padding: 4px 0 6px;
        }
        .keypad-op {
            background: transparent; border: none;
            color: var(--accent-green);
            font-family: inherit; font-size: 20px; font-weight: 400;
            padding: 10px 0; cursor: pointer;
            border-radius: 12px;
            line-height: 1;
            transition: background 0.15s ease;
        }
        .keypad-op:active { background: rgba(90, 147, 116, 0.12); }
        .keypad-actions {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 6px;
            padding: 8px 0 0;
            margin-top: 6px;
            border-top: 1px solid #F0F0F0;
        }
        .keypad-action {
            background: transparent; border: none;
            color: var(--text-main);
            font-family: inherit; font-size: 13px; font-weight: 600;
            padding: 14px 0; cursor: pointer;
            border-radius: 14px;
            letter-spacing: 0.6px;
            transition: background 0.15s ease;
        }
        .keypad-action:active { background: rgba(13, 18, 19, 0.06); }
        .keypad-action.keypad-done {
            background: var(--accent-green); color: #FFFFFF;
            font-weight: 600; letter-spacing: 1.5px;
            text-transform: uppercase; font-size: 11px;
        }
        .keypad-action.keypad-done:active { background: #4A7E63; }

        /* === v7.0 Infinite Anchor Search === */
        .discovery-sheet { padding: 22px 22px calc(28px + var(--safe-b)); max-height: 82vh; display: flex; flex-direction: column; }
        .search-bar {
            display: flex; gap: 8px; align-items: center;
            padding: 6px 0 16px;
        }
        .search-input {
            flex: 1;
            background: #F5F5F7;
            border: 1px solid #EEEEEE; border-radius: 12px;
            padding: 12px 14px;
            font-family: inherit; font-size: 13px; font-weight: 400;
            color: var(--text-main); outline: none;
            -webkit-appearance: none;
        }
        .search-input:focus { border-color: var(--accent-green); background: #FFFFFF; }
        .search-input::placeholder { color: var(--text-main); opacity: 0.42; }
        .search-submit {
            background: var(--accent-green); color: #FFFFFF; border: none;
            border-radius: 12px; padding: 12px 18px;
            font-family: inherit; font-size: 11px; font-weight: 600;
            cursor: pointer; letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        .search-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .search-status {
            padding: 18px 4px;
            font-size: 12px; font-weight: 400;
            color: var(--text-main); opacity: 0.7;
            text-align: center; line-height: 1.5;
        }
        .search-status.error { color: var(--accent-green); opacity: 1; font-weight: 600; }
        .search-results {
            display: flex; flex-direction: column; gap: 6px;
            padding: 0 0 14px;
        }
        .search-results:empty { padding: 0; }
        .result-card {
            display: grid;
            grid-template-columns: 26px 1fr auto 22px;
            gap: 10px; align-items: center;
            padding: 12px 14px;
            background: rgba(90, 147, 116, 0.06);
            border: 1px solid rgba(90, 147, 116, 0.25);
            border-radius: 14px;
            font-family: inherit; text-align: left; cursor: pointer;
            width: 100%;
            transition: background 0.15s ease, transform 0.1s ease;
        }

    const LANGS = ['en', 'zh', 'fr'];
    const initialLang = (() => {
        const stored = localStorage.getItem('fx_lang');
        if (LANGS.includes(stored)) return stored;
        const nav = (navigator.language || 'en').toLowerCase();
        if (nav.startsWith('zh')) return 'zh';
        if (nav.startsWith('fr')) return 'fr';

    })();

    let S = {
        base: localStorage.getItem('fx_base') || 'EUR',
        target: localStorage.getItem('fx_target') || 'CNY',
        amount: 100, cr: 0, hist: [],
        activeTab: 'weather',

    function t() { return I18N[S.lang]; }
    function haptic() {
        if (navigator.vibrate && localStorage.getItem('fx_haptic') !== 'off') navigator.vibrate(10);
    }

    // === v5.0.1 Ticking number animation ===
    const _tickRAF = new WeakMap();
    const _defaultFmt = (v) => Number(v.toFixed(2)).toLocaleString();
    function tickNumber(el, from, to, duration, formatter) {
        if (!el) return;
        const fmt = formatter || _defaultFmt;
        const prior = _tickRAF.get(el);
        if (prior) cancelAnimationFrame(prior);
        if (Math.abs(to - from) < 0.01) {
            el.textContent = fmt(to);
            return;
        }
        const dur = duration || 380;
        const start = performance.now();
        function step(now) {
            const elapsed = now - start;
            const progress = Math.min(1, elapsed / dur);
            const eased = 1 - Math.pow(1 - progress, 3);
            const current = from + (to - from) * eased;
            el.textContent = fmt(current);
            if (progress < 1) {
                _tickRAF.set(el, requestAnimationFrame(step));
            } else {
                _tickRAF.delete(el);
            }
        }
        _tickRAF.set(el, requestAnimationFrame(step));
    }

    // Previous-value caches for ticking from last displayed number
    const _prevCosts = { zero: 0, card: 0, atm: 0 };
    const _prevPPP = {};  // keyed by anchor index: last displayed count
    let _prevSplit = 0;

    function tickRoutes() {
        document.querySelectorAll('.route-cost[data-target]').forEach(el => {
            const target = parseFloat(el.dataset.target) || 0;
            const method = el.dataset.method;
            const from = _prevCosts[method] || 0;
            tickNumber(el, from, target);
            _prevCosts[method] = target;
        });
    }
    function tickPPP() {
        document.querySelectorAll('.ppp-count[data-target]').forEach(el => {
            const target = parseFloat(el.dataset.target) || 0;
            const idx = el.dataset.idx;
            const from = _prevPPP[idx] != null ? _prevPPP[idx] : 0;
            const fmt = target >= 10
                ? (v) => String(Math.round(v))
                : (v) => (Math.round(v * 10) / 10).toFixed(1);
            tickNumber(el, from, target, 380, fmt);
            _prevPPP[idx] = target;
        });
    }
    function resetCostCaches() {
        _prevCosts.zero = 0; _prevCosts.card = 0; _prevCosts.atm = 0;
        Object.keys(_prevPPP).forEach(k => delete _prevPPP[k]);
    }
    function escapeAttr(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // === Wallet rates ===
    function getWalletRates() {
        return {
            zero: parseFloat(localStorage.getItem('fx_rate_zero')) || 0.0035,
            card: parseFloat(localStorage.getItem('fx_rate_card')) || 0.015,
            atm:  parseFloat(localStorage.getItem('fx_fee_atm'))  || 3.0

    function setWalletRate(key, value) {
        if (isNaN(value)) return;

    // === Anchors ===
    function getAnchors() {
        try {
            const raw = localStorage.getItem('fx_anchors');
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
        } catch (e) { return []; }
    }
    function setAnchors(arr) { localStorage.setItem('fx_anchors', JSON.stringify(arr)); }
    function updateAnchor(idx, field, value) {
        const arr = getAnchors();
        if (!arr[idx]) return;
        if (field === 'price') value = parseFloat(value) || 0;
        arr[idx][field] = value;
        setAnchors(arr);
    }
    function addAnchor() {
        haptic();
        const arr = getAnchors();
        if (arr.length >= MAX_ANCHORS) return;
        arr.push({ emoji: '', label: '', price: 0, currency: S.target });
        setAnchors(arr);
        renderContent();
    }
    function removeAnchor(idx) {
        haptic();
        const arr = getAnchors();
        arr.splice(idx, 1);
        setAnchors(arr);
        renderContent();
    }
    function calcAnchors(billInBase) {
        if (!billInBase || !S.cr) return [];
        return getAnchors()
            .map((a, idx) => ({ ...a, _idx: idx }))
            .filter(a => a.price > 0 && a.label && (a.currency === S.base || a.currency === S.target))
            .map(a => {
                const count = (a.currency === S.base)
                    ? billInBase / a.price
                    : (billInBase * S.cr) / a.price;
                return { ...a, count };
            });
    }

    // === v6.3: Seed anchors from GLOBAL_PPP_DB.food on first launch ===
    function seedAnchorsIfEmpty() {
        if (localStorage.getItem('fx_anchors_seeded') === 'true') return;
        if (getAnchors().length > 0) {
            localStorage.setItem('fx_anchors_seeded', 'true');
            return;

        const baseData = GLOBAL_PPP_DB[S.base];
        const targetData = GLOBAL_PPP_DB[S.target];
        const seeded = [];
        if (baseData && baseData.food) {
            baseData.food.slice(0, 2).forEach(item => {

                    emoji: item.emoji,
                    label: `${item.label} (${baseData.city})`,

        if (targetData && targetData.food && S.target !== S.base) {
            const item = targetData.food[0];
            seeded.push({
                emoji: item.emoji,
                label: `${item.label} (${targetData.city})`,
                price: item.price,
                currency: S.target

        if (seeded.length) setAnchors(seeded);

    async function selectCurrency(curr) {
        haptic();
        closeCurrencyModal();
        if (currentPickerType === 'base' && S.base !== curr) {
            S.base = curr;

            resetCostCaches();
            renderContent();
            await fetchR();
            renderContent();
        } else if (currentPickerType === 'target' && S.target !== curr) {
            S.target = curr;
            S.vatRefundOn = false;     // VAT rule changes with target
            invalidateIntelOnContextChange();   // intel is per-country, must re-fetch
            resetCostCaches();
            renderContent();
            await fetchR();
            renderContent();
        } else if (currentPickerType.startsWith('anchor:')) {
            const idx = parseInt(currentPickerType.split(':')[1], 10);

        if (!LANGS.includes(lang) || S.lang === lang) return;

        document.documentElement.lang = S.lang === 'zh' ? 'zh-CN' : S.lang === 'fr' ? 'fr' : 'en';

    function toggleHaptic() {

    async function fetchR() {
        try {
            const r = await fetch(`https://api.exchangerate-api.com/v4/latest/${S.base}`);
            const d = await r.json();
            S.cr = d.rates[S.target] || 0;
            localStorage.setItem('fx_base', S.base);
            localStorage.setItem('fx_target', S.target);
        } catch(e) { console.error("Rate API error", e); S.cr = 0; }

        try {
            const today = new Date();
            const end = today.toISOString().split('T')[0];
            today.setDate(today.getDate() - 30);
            const start = today.toISOString().split('T')[0];
            const hr = await fetch(`https://api.frankfurter.dev/v1/${start}..${end}?from=${S.base}&to=${S.target}`);
            const hd = await hr.json();
            if (hd && hd.rates) {
                S.hist = Object.keys(hd.rates).sort().map(date => ({
                    date, rate: hd.rates[date][S.target]
                }));
            } else {
                S.hist = [];
            }
        } catch(e) { console.error("History API error", e); S.hist = []; }
        applyHeroGradient();
    }

    // [产品决策] 7-day MA weather bands — thresholds ±0.3% / ±0.8% per PRD v4.1 (carried into v5.0)
    function calcWeatherBand() {
        if (!S.cr || S.hist.length < 7) return null;
        const last7 = S.hist.slice(-7);
        const ma = last7.reduce((a, b) => a + b.rate, 0) / last7.length;
        if (ma === 0) return null;
        const delta = (S.cr - ma) / ma * 100;
        if (delta >=  0.8) return { band: 'great',  delta };
        if (delta >=  0.3) return { band: 'good',   delta };
        if (delta >  -0.3) return { band: 'stable', delta };
        if (delta >  -0.8) return { band: 'poor',   delta };
        return { band: 'storm', delta };
    }

    function renderHeroWeatherLabel() {
        const w = calcWeatherBand();
        const d = t();
        if (!w) return d.weatherBand.loading;
        const sign = w.delta >= 0 ? '+' : '';
        return `${sign}${w.delta.toFixed(2)}% · ${d.weatherBand[w.band]}`;
    }

    function calcRouting(amount) {
        if (!S.cr || !amount || amount <= 0) return null;
        const r = getWalletRates();
        const methods = [
            { id: 'zero', cost: amount * S.cr * (1 + r.zero) },
            { id: 'card', cost: amount * S.cr * (1 + r.card) },
            { id: 'atm',  cost: amount * S.cr * (1 + r.card) + r.atm * S.cr }
        ];
        methods.sort((a, b) => a.cost - b.cost);
        methods.forEach((m, i) => {
            m.isBest = (i === 0);
            m.rank = i;
            m.delta = m.cost - methods[0].cost;
        });
        return methods;
    }

    function calcTimeMachine() {
        if (S.hist.length < 6 || !S.cr) return null;
        const lastWeek = S.hist[S.hist.length - 6];
        const totalDelta = 1000 * (S.cr - lastWeek.rate);
        return {
            date: lastWeek.date,
            absDelta: Math.abs(totalDelta),
            isSave: totalDelta >= 0
        };
    }

    function renderContent() {
        const c = document.getElementById('content');
        // Sync cache hit for intel BEFORE rendering Guide so cached path skips loader.
        if (S.activeTab === 'guide') ensureGuideIntelSync();

        else if (S.activeTab === 'guide')    c.innerHTML = vGuide();
        else if (S.activeTab === 'backpack') c.innerHTML = vBackpack();
        else c.innerHTML = '';
        renderDock();
        applyTabGradient(S.activeTab);
        if (S.activeTab === 'weather') { tickRoutes(); tickPPP(); maybeRenderGeoBanner(); }
        if (S.activeTab === 'guide')   { ensureGuideIntel(); }   // async no-op or fetch
    }

                    <div class="section-label">${d.routesSection}</div>

                    <button class="local-anchor-cta" onclick="openDiscovery()" ${getAnchors().length >= MAX_ANCHORS ? 'disabled' : ''}>
                        ＋ ${d.addLocalAnchor}

    // v7.2 visceral PPP progress bar — top 2 anchors with biggest absolute multiplier
    // Uses the existing calcAnchors() output (currency-aware) so no new fake data.
    function renderPPPProgressBar() {
        if (!S.amount || S.amount <= 0 || !S.cr) return '';
        const items = calcAnchors(S.amount);
        if (items.length === 0) return '';
        const sorted = items.slice().sort((a, b) => b.count - a.count);
        const picks = sorted.slice(0, 2);
        const lines = picks.map(a => {
            const m = a.count;
            const formatted = m >= 10 ? Math.round(m).toLocaleString() : m.toFixed(1);
            return `≈ ${formatted}× ${escapeHtml(a.label)}`;
        });
        return lines.join(' &nbsp;|&nbsp; ');
    }

    // === v7.2 Zen Checkout Mode ===
    function enterZen() {
        haptic();
        S.zenMode = true;
        renderZenOverlay();

    // Swipe-right bonus gesture (only when on Weather, not in any modal, not in Zen).
    let _swipeStartX = null, _swipeStartY = null;
    document.addEventListener('touchstart', e => {
        if (S.zenMode) return;
        if (S.activeTab !== 'weather') return;
        if (document.querySelector('.modal-overlay.show')) return;
        if (e.touches && e.touches.length === 1) {
            _swipeStartX = e.touches[0].clientX;
            _swipeStartY = e.touches[0].clientY;
        }
    }, { passive: true });
    document.addEventListener('touchend', e => {
        if (_swipeStartX === null) return;
        const t = e.changedTouches && e.changedTouches[0];
        if (t) {
            const dx = t.clientX - _swipeStartX;
            const dy = Math.abs(t.clientY - _swipeStartY);
            if (dx > 90 && dy < 40 && S.activeTab === 'weather' && !S.zenMode &&
                !document.querySelector('.modal-overlay.show')) {
                enterZen();
            }
        }
        _swipeStartX = null; _swipeStartY = null;
    }, { passive: true });

    // === v7.2.1 Tax-Free Radar — render + toggle + Lumina Flip ===
    function renderVatRadar() {
        const d = t();
        if (!S.amount || S.amount <= 0 || !S.cr) return '';
        // UK exception
        if (S.target === 'GBP') {
            return `<div class="vat-radar-uk">${d.vatRadarUk}</div>`;
        }
        const rule = currentVatRule();
        if (!rule) return '';
        const spendInTarget = S.amount * S.cr;
        if (spendInTarget < rule.threshold) {
            const gap = Math.ceil(rule.threshold - spendInTarget);
            const gapStr = gap.toLocaleString();
            const txt = d.vatRadarGap.replace('{gap}', gapStr).replace('{ccy}', S.target);
            return `<div class="vat-radar-gap">${txt}</div>`;
        }
        const ratePct = Math.round(rule.rate * 100);
        if (S.vatRefundOn) {
            const txt = d.vatRadarActive.replace('{rate}', ratePct);
            const dcc = d.vatRadarDcc.replace('{BASE}', S.base).replace('{TARGET}', S.target);
            return `
                <button class="vat-radar-active" onclick="toggleVatRefund()">${txt}</button>
                <div class="vat-radar-dcc">${dcc}</div>
            `;
        }
        const txt = d.vatRadarEligible.replace('{rate}', ratePct);
        return `<button class="vat-radar-eligible" onclick="toggleVatRefund()">${txt}</button>`;
    }

    function refreshVatRadar() {
        const slot = document.getElementById('vat-radar');
        if (slot) slot.innerHTML = renderVatRadar();

    // Update hero base + target text (and accent-green tint) given current
    // VAT toggle state. Used both by toggleVatRefund mid-flip and by
    // updateKeypad on every keystroke so the hero stays in sync.
    function applyHeroAmountValues() {
        reconcileVatState();
        const eff = effectiveBaseAmount();
        const heroBase   = document.getElementById('hero-amount-text');
        const heroTarget = document.getElementById('hero-target-amount');
        [heroBase, heroTarget].forEach(el => {
            if (el) el.classList.toggle('savings-on', S.vatRefundOn);
        });
        if (heroBase) {
            heroBase.textContent = eff > 0
                ? Number(eff.toFixed(2)).toLocaleString()
                : '';
        }
        if (heroTarget) {
            const tv = (eff > 0 && S.cr) ? eff * S.cr : 0;
            heroTarget.textContent = tv > 0

    // === v7.1 Vercel: Zero-click Geo-IP PPP ===
    // On first Weather-tab render we call /api/geo (backed by Vercel's edge IP
    // headers — no browser permission prompt, no PII stored). When the returned
    // country maps to a currency we already have curated price data for, we seed
    // 2–3 anchors from GLOBAL_PPP_DB and re-label them with the detected city.
    // No curated match → banner stays hidden (user can still add via search).
    let _geoPayload = null;
    let _geoDetectStarted = false;

    const COUNTRY_TO_CCY = {
        // Eurozone — keep in sync with GLOBAL_PPP_DB.EUR
        FR: 'EUR', DE: 'EUR', IT: 'EUR', ES: 'EUR', NL: 'EUR', BE: 'EUR',
        PT: 'EUR', AT: 'EUR', IE: 'EUR', FI: 'EUR', GR: 'EUR', LU: 'EUR',
        SI: 'EUR', SK: 'EUR', EE: 'EUR', LV: 'EUR', LT: 'EUR', CY: 'EUR',
        MT: 'EUR', HR: 'EUR',
        US: 'USD', GB: 'GBP', JP: 'JPY', AU: 'AUD', CA: 'CAD',
        CH: 'CHF', LI: 'CHF', CN: 'CNY', SG: 'SGD', HK: 'HKD'
    };

    // === v7.2.1 Tax-Free Radar — VAT_RULES ===
    // [推论 · v7.2 PM-curated 2026 baseline]: thresholds in target currency,
    // refund rate as a decimal (0.10 = 10% off post-refund). EUR sub-rules
    // are picked when geo-IP resolves the user's country; otherwise the
    // generic EUR fallback applies. UK is handled via a separate exception
    // path (no toggle, just informational) since tourist VAT was abolished
    // in 2020.
    const VAT_RULES = {
        // Single-currency rules
        JPY:    { threshold: 5000,  rate: 0.10  },     // Japan Tax-Free
        AUD:    { threshold: 300,   rate: 0.10  },     // TRS Refund
        SGD:    { threshold: 100,   rate: 0.09  },     // SG Tourist Refund
        KRW:    { threshold: 30000, rate: 0.10  },     // Korea Tax-Free
        CHF:    { threshold: 300,   rate: 0.077 },     // CH MWST Refund
        // EUR sub-rules (used when geoCountry resolves)
        EUR_FR: { threshold: 100,   rate: 0.12  },     // France Détaxe (PM spec)
        EUR_DE: { threshold: 50,    rate: 0.11  },     // Germany VAT (PM spec)
        // Generic EUR fallback when country unknown or other EU member
        EUR:    { threshold: 100,   rate: 0.11  },
        // Explicit "no VAT refund" entries — keep so currentVatRule() returns null cleanly
        USD: null, CNY: null, HKD: null, CAD: null
        // GBP intentionally omitted — UK exception path renders instead.
    };

    function currentVatRule() {
        const target = S.target;
        if (target === 'GBP') return { uk: true };
        if (target === 'EUR' && S.geoCountry) {
            const subKey = `EUR_${S.geoCountry}`;
            if (VAT_RULES[subKey]) return VAT_RULES[subKey];
        }
        return VAT_RULES[target] || null;
    }

    // Returns the BASE-currency amount the user actually pays after refund.
    function effectiveBaseAmount() {
        if (!S.vatRefundOn) return S.amount;
        const rule = currentVatRule();
        if (!rule || rule.uk) return S.amount;
        return S.amount * (1 - rule.rate);
    }

    // If current state would leave a "refund applied" toggle stuck on after
    // the user changed amount/target below threshold, silently flip it off.
    function reconcileVatState() {
        if (!S.vatRefundOn) return;
        const rule = currentVatRule();
        if (!rule || rule.uk) { S.vatRefundOn = false; return; }
        const spendInTarget = (S.amount || 0) * (S.cr || 0);
        if (spendInTarget < rule.threshold) S.vatRefundOn = false;
    }

    async function autoDetectGeoPPP() {
        if (_geoDetectStarted) return;
        if (localStorage.getItem('fx_geo_dismissed') === 'true') return;
        if (localStorage.getItem('fx_geo_applied') === 'true') return;
        _geoDetectStarted = true;

        let country = '', city = '';
        try {
            const res = await fetch('/api/geo', { cache: 'no-store' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            country = (data.country || '').toUpperCase();
            city = data.city || '';
            if (country) S.geoCountry = country; // VAT_RULES EUR sub-rules read this
        } catch (err) {
            console.info('[Geo] /api/geo unreachable (likely local dev):', err.message);
            return;
        }

        if (!country) {
            console.info('[Geo] No country resolved. Banner skipped.');
            return;
        }

        const currency = COUNTRY_TO_CCY[country];
        if (!currency || !GLOBAL_PPP_DB[currency]) {
            console.info(`[Geo] ${country} not yet curated in GLOBAL_PPP_DB. Banner skipped.`);
            return;
        }

        const seed = GLOBAL_PPP_DB[currency];
        const pppCity = city || seed.city;
        const items = [];
        ['food', 'grocery', 'tech', 'shopping'].forEach(cat => {
            if (items.length >= 3) return;
            const arr = seed[cat];
            if (arr && arr.length > 0) {
                items.push({
                    emoji:    arr[0].emoji,
                    label:    `${arr[0].label} (${pppCity})`,
                    price:    arr[0].price,
                    currency
                });
            }
        });
        if (items.length === 0) return;

        _geoPayload = { city: pppCity, country, currency, items };
        console.info(`[Geo] Detected ${pppCity} (${country}). ${items.length} anchors ready.`);
        maybeRenderGeoBanner();
    }

    function maybeRenderGeoBanner() {
        const slot = document.getElementById('geo-banner');
        if (!slot) return;
        if (localStorage.getItem('fx_geo_dismissed') === 'true' ||

            slot.classList.remove('show');
            slot.innerHTML = '';
            return;
        }
        if (!_geoPayload) { autoDetectGeoPPP(); return; }
        const d = t();
        slot.classList.add('show');
        slot.innerHTML = `
            <span class="geo-banner-icon">📍</span>
            <span class="geo-banner-text">${d.geoBannerDetected.replace('{city}', _geoPayload.city)}</span>

        `;
    }

    // === v7.3 Live Intel (Mistral country-specific tip feed) ===
    const INTEL_TTL_MS = 24 * 60 * 60 * 1000;

    // Best-effort country fallback when geo-IP didn't resolve. Returns the
    // first country whose currency matches S.target — for EUR this gives
    // 'FR' (most-common tourist Eurozone destination), good enough for tips.
    function reverseCcyToCountry(ccy) {
        for (const country in COUNTRY_TO_CCY) {
            if (COUNTRY_TO_CCY[country] === ccy) return country;
        }
        return null;
    }

    function intelKeyFor(country, lang) { return `${country}_${lang}`; }

    // Synchronous cache hit check — populates S.intelCards if a fresh entry
    // exists for the current (country, lang) pair. Called BEFORE vGuide()
    // renders so the cached path skips the loading flicker.
    function ensureGuideIntelSync() {
        const country = (S.geoCountry || reverseCcyToCountry(S.target) || '').toUpperCase();
        if (!country) return false;
        const key = intelKeyFor(country, S.lang);
        if (S.intelKey === key && S.intelCards.length > 0) return true;
        const raw = localStorage.getItem(`fx_intel_${key}`);
        if (!raw) return false;
        try {
            const { items, ts } = JSON.parse(raw);
            if (Array.isArray(items) && items.length > 0 && Date.now() - ts < INTEL_TTL_MS) {
                S.intelCards   = items;
                S.intelKey     = key;
                S.intelLoading = false;
                S.intelError   = false;
                return true;
            }
        } catch {}
        return false;
    }

    async function ensureGuideIntel() {
        if (ensureGuideIntelSync()) return; // fresh cache covers this turn
        const country = (S.geoCountry || reverseCcyToCountry(S.target) || '').toUpperCase();
        if (!country) return;
        const key = intelKeyFor(country, S.lang);
        S.intelCards   = [];
        S.intelLoading = true;
        S.intelError   = false;
        S.intelKey     = key;
        refreshGuideIntelDom();
        try {
            const res = await fetch('/api/intel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ country, currency: S.target, lang: S.lang })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            const items = Array.isArray(data && data.items)
                ? data.items.filter(it => it && it.title && it.body)
                : [];
            if (items.length === 0) throw new Error('Empty items');
            S.intelCards   = items;
            S.intelLoading = false;
            S.intelError   = false;
            localStorage.setItem(`fx_intel_${key}`,
                JSON.stringify({ items, ts: Date.now() }));
        } catch (err) {
            console.warn('[Intel] /api/intel fetch failed:', err.message);
            S.intelCards   = [];
            S.intelLoading = false;
            S.intelError   = true;
        }
        refreshGuideIntelDom();
    }
